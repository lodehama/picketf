<!DOCTYPE html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout/layout.html}"
>
  <head>
    <title>메인 페이지</title>
  </head>
  <main layout:fragment="content">
    <div class="container py-3">
      <h5 class="mb-3">KRX ETF 조회</h5>
      <div class="mb-2">
        <strong>기준일자: 추후에 DB에서 가져오기</strong>

      <table class="table table-striped">
        <thead>
          <tr>
            <th></th>
            <th>기준일</th>
            <th>종목명</th>
            <th>실부담비용</th>
            <th>종가</th>
            <th>등락률(%)</th>
            <th>순자산가치(NAV)</th>
            <th>거래량</th>
            <th>거래대금</th>
            <th>시가총액</th>
            <th>기초지수 등락률(%)</th>
            <th>괴리율</th>
          </tr>
        </thead>
        <tbody>
          <tr data-code="379800">
            <td>7</td>
            <td class="BAS_DD">-</td>
            <td class="ISU_NM">-</td>
            <td>0.01%</td>
            <td class="TDD_CLSPRC">-</td>
            <td class="FLUC_RT">-</td>
            <td class="NAV">-</td>
            <td class="ACC_TRDVOL">-</td>
            <td class="ACC_TRDVAL">-</td>
            <td class="MKTCAP">-</td>
            <td class="FLUC_RT_IDX">-</td>
            <td class="premium">-</td>
          </tr>

          <tr data-code="360750">
            <td>8</td>
            <td class="BAS_DD">-</td>
            <td class="ISU_NM">-</td>
            <td>0.02%</td>
            <td class="TDD_CLSPRC">-</td>
            <td class="FLUC_RT">-</td>
            <td class="NAV">-</td>
            <td class="ACC_TRDVOL">-</td>
            <td class="ACC_TRDVAL">-</td>
            <td class="MKTCAP">-</td>
            <td class="FLUC_RT_IDX">-</td>
            <td class="premium">-</td>
          </tr>
        </tbody>
      </table>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        const rows = Array.from(document.querySelectorAll("tr[data-code]"));
        console.log(
          "[FE] rows & codes",
          rows.map((r) => r.dataset.code)
        ); // ✅ 코드 리스트 확인

        const codes = rows.map((r) => r.dataset.code).join(",");

        // 필요하면 basDd 쿼리 추가: `&basDd=20251021`
        const res = await fetch(`/api/krx?codes=${codes}`);
        const allData = await res.json(); // {"482730": {...}, "433330": {...}}

        // DTO 키 목록(열과 1:1)
        const dtoKeys = [
          "BAS_DD",
          "ISU_CD",
          "ISU_NM",
          "TDD_CLSPRC",
          "CMPPREVDD_PRC",
          "FLUC_RT",
          "NAV",
          "TDD_OPNPRC",
          "TDD_HGPRC",
          "TDD_LWPRC",
          "ACC_TRDVOL",
          "ACC_TRDVAL",
          "MKTCAP",
          "INVSTASST_NETASST_TOTAMT",
          "LIST_SHRS",
          "IDX_IND_NM",
          "OBJ_STKPRC_IDX",
          "CMPPREVDD_IDX",
          "FLUC_RT_IDX",
        ];

        const toNum = (v) => {
          if (v === null || v === undefined) return NaN;
          const s = String(v).replace(/,/g, "").trim();
          const n = Number(s);
          return isNaN(n) ? NaN : n;
        };

        rows.forEach((row) => {
          const code = row.dataset.code;
          const data = allData[code] || {};

          // DTO 키들 채우기 (대소문자 그대로)
          dtoKeys.forEach((k) => {
            const el = row.querySelector(`.${k}`);
            if (el) el.textContent = data[k] ?? "-";
          });

          // premium 계산 = (종가 - NAV)/NAV * 100
          const elPrem = row.querySelector(".premium");
          if (elPrem) {
            const nav = toNum(data["NAV"]);
            const close = toNum(data["TDD_CLSPRC"]);
            elPrem.textContent =
              !isNaN(nav) && nav !== 0 && !isNaN(close)
                ? (((close - nav) / nav) * 100).toFixed(2) + "%"
                : "-";
          }
        });
      });
    </script>
  </main>
</html>
