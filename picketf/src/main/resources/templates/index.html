<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout/layout.html}">

<head>
  <title>Pick ETF</title>
</head>

<main class="app-content" layout:fragment="content">
  <div class="container py-5">

    <!-- 서비스 소개 -->
    <div class="text-center mb-5">
      <h1 class="mb-3">Pick ETF</h1>

      <p class="lead">
        ETF 투자자를 위한 <br>
        세금 · 자산 메뉴와 편의성 기능들을 제공합니다.
      </p>
      <p>
        상단 메뉴에서는 S&P 500, 나스닥 100 등 주요 지수를 추종하는 국내 상장 ETF를 확인할 수 있습니다.
      </p>
    </div>

    <!-- 기능 바로가기 -->
    <div class="row g-3 justify-content-center">

      <div class="col-md-3">
        <a th:href="@{/isa}" class="text-decoration-none">
          <div class="card text-center h-100">
            <div class="card-body">
              <h5 class="card-title">ISA 계좌 관리</h5>
              <p class="text-muted small">납입 한도 및 계좌 상태 관리</p>
            </div>
          </div>
        </a>
      </div>
      
      <div class="col-md-3">
        <a th:href="@{/subs}" class="text-decoration-none">
          <div class="card text-center h-100">
            <div class="card-body">
              <h5 class="card-title">구독 관리</h5>
              <p class="text-muted small">정기 지출 관리</p>
            </div>
          </div>
        </a>
      </div>
      
      <div class="col-md-3">
        <a th:href="@{/isa/tax}" class="text-decoration-none">
          <div class="card text-center h-100">
            <div class="card-body">
              <h5 class="card-title">ISA 절세 계산기</h5>
              <p class="text-muted small">ISA vs 직투 세금 비교</p>
            </div>
          </div>
        </a>
      </div>
      
      <div class="col-md-3">
        <a th:href="@{/cpi}" class="text-decoration-none">
          <div class="card text-center h-100">
            <div class="card-body">
              <h5 class="card-title">화폐 가치 계산기</h5>
              <p class="text-muted small">물가 상승률 기반 가치 계산</p>
            </div>
          </div>
        </a>
      </div>


    </div>

  </div>
</main>

</html>
