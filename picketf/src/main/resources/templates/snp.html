<!DOCTYPE html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout/layout.html}"
>
  <head>
    <title>메인 페이지</title>
  </head>
  <main layout:fragment="content">
    <div class="container">
      <div class="row text-center">
        <div class="col-1 border">1</div>
        <div class="col-1 border">2</div>
        <div class="col-1 border">3</div>
        <div class="col-1 border">4</div>
        <div class="col-1 border">5</div>
        <div class="col-1 bg-warning border">6</div>
        <div class="col-1 bg-warning border">7</div>
        <div class="col-1 border">8</div>
        <div class="col-1 border">9</div>
        <div class="col-1 border">10</div>
        <div class="col-1 border">11</div>
        <div class="col-1 border">12</div>
      </div>
    </div>

    <div class="container mt-3">
      <h2>Striped Rows</h2>
      <p>The .table-striped class adds zebra-stripes to a table:</p>
      <table class="table table-striped">
        <thead>
          <tr>
            <th>순위</th>
            <th>이름</th>
            <th>% 실부담비용</th>
            <th>종가</th>
            <th>거래대금</th>
            <th>수익률 (1개월)</th>
            <th>수익률 (3개월)</th>
            <th>수익률 (6개월)</th>
            <th>수익률 (12개월)</th>
            <th>괴리율</th>
          </tr>
        </thead>
        <tbody>
          <tr data-code="379800">
            <td>1</td>

            <td>

              <div class="name">-</div>
              <div class="issueName">-</div>

            </td>

            <td>?</td>
            <td class="price">-</td>
            <td class="accumulatedTradingValue">-</td>
            <td class="oneMonthEarnRate">-</td>
            <td class="threeMonthEarnRate">-</td>
            <td class="sixMonthEarnRate">-</td>
            <td class="oneYearEarnRate">-</td>
            <td class="nav">-</td>
          </tr>
          <tr>
            <td>2</td>
            <td>Moe</td>
            <td>mary@example.com</td>
          </tr>
          <tr>
            <td>3</td>
            <td>Dooley</td>
            <td>july@example.com</td>
          </tr>
        </tbody>
      </table>
    </div>
    <script>
      const set = (tr, sel, val) => {
        const el = tr.querySelector(sel);
        if (el) el.textContent = val ?? "-";
      };

      async function refreshBatch() {
        try {
          const rows = Array.from(document.querySelectorAll("tr[data-code]"));
          if (rows.length === 0) return;

          const codes = rows.map((r) => r.dataset.code).join(",");
          const res = await fetch(`/api/stocks?codes=${codes}`, {
            cache: "no-store",
          });
          const list = await res.json().catch(() => []);
          const map = Object.fromEntries(list.map((x) => [x.code, x]));

          for (const tr of rows) {
            const d = map[tr.dataset.code];
            if (!d) continue;

            // 기본
            set(tr, ".name", d.name);
            set(tr, ".price", d.price);
            set(tr, ".mcap", d.marketCap);
            set(tr, ".per", d.per);
            set(tr, ".pbr", d.pbr);

            // ETF/확장
            set(tr, ".lastClosePrice", d.lastClosePrice);
            set(tr, ".accumulatedTradingValue", d.accumulatedTradingValue);
            set(tr, ".oneMonthEarnRate", d.oneMonthEarnRate);
            set(tr, ".threeMonthEarnRate", d.threeMonthEarnRate);
            set(tr, ".sixMonthEarnRate", d.sixMonthEarnRate);
            set(tr, ".oneYearEarnRate", d.oneYearEarnRate);
            set(tr, ".nav", d.nav);
            set(tr, ".fundPay", d.fundPay);
            set(tr, ".issueName", d.issueName);
          }
        } catch (e) {
          console.error("데이터 반영 실패", e);
        }
      }

      // 페이지 로드 시 1회
      refreshBatch();
    </script>
  </main>
</html>
