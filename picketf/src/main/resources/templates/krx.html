<!DOCTYPE html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout/layout.html}"
>
  <head>
    <title>메인 페이지</title>
  </head>
  <main layout:fragment="content">
    <div class="container py-3">
      <h5 class="mb-3">KRX ETF 조회</h5>
      <div class="mb-2">
        <strong>기준일자: 추후에 DB에서 가져오기</strong>

      <table class="table">
        <thead>
          <tr>
            <th></th>
            <th>기준일</th>
            <th>종목명</th>
            <th>실부담비용 <i class="bi bi-caret-down-fill"></i></th>
            <th>종가</th>
            <th>등락률(%)</th>
            <th>순자산가치(NAV)</th>
            <th>거래량</th>
            <th>거래대금</th>
            <th>시가총액</th>
            <th>기초지수 등락률(%)</th>
            <th>괴리율</th>
          </tr>
        </thead>
        <tbody>
          <tr data-code="379800">
            <td>7</td>
            <td class="BAS_DD">-</td>
            <td class="ISU_NM">-</td>
            <td>0.021%</td>
            <td class="TDD_CLSPRC">-</td>
            <td class="FLUC_RT">-</td>
            <td class="NAV">-</td>
            <td class="ACC_TRDVOL">-</td>
            <td class="ACC_TRDVAL">-</td>
            <td class="MKTCAP">-</td>
            <td class="FLUC_RT_IDX">-</td>
            <td class="premium">-</td>
          </tr>

          <tr data-code="360750">
            <td>8</td>
            <td class="BAS_DD">-</td>
            <td class="ISU_NM">-</td>
            <td>0.011%</td>
            <td class="TDD_CLSPRC">-</td>
            <td class="FLUC_RT">-</td>
            <td class="NAV">-</td>
            <td class="ACC_TRDVOL">-</td>
            <td class="ACC_TRDVAL">-</td>
            <td class="MKTCAP">-</td>
            <td class="FLUC_RT_IDX">-</td>
            <td class="premium">-</td>
          </tr>
        </tbody>
      </table>
    </div>
    <script>
  document.addEventListener("DOMContentLoaded", async () => {
    const rows = Array.from(document.querySelectorAll("tr[data-code]"));
    const codes = rows.map((r) => r.dataset.code).join(",");
    const res = await fetch(`/api/krx?codes=${codes}`);
    const allData = await res.json();

    const dtoKeys = [
      "BAS_DD",
      "ISU_CD",
      "ISU_NM",
      "TDD_CLSPRC",
      "CMPPREVDD_PRC",
      "FLUC_RT",
      "NAV",
      "TDD_OPNPRC",
      "TDD_HGPRC",
      "TDD_LWPRC",
      "ACC_TRDVOL",
      "ACC_TRDVAL",
      "MKTCAP",
      "INVSTASST_NETASST_TOTAMT",
      "LIST_SHRS",
      "IDX_IND_NM",
      "OBJ_STKPRC_IDX",
      "CMPPREVDD_IDX",
      "FLUC_RT_IDX",
    ];

    const toNum = (v) => {
      if (v === null || v === undefined) return NaN;
      const s = String(v).replace(/,/g, "").trim();
      const n = Number(s);
      return isNaN(n) ? NaN : n;
    };

    // 데이터 채우기
    rows.forEach((row) => {
      const code = row.dataset.code;
      const data = allData[code] || {};

      dtoKeys.forEach((k) => {
        const el = row.querySelector(`.${k}`);
        if (el) el.textContent = data[k] ?? "-";
      });

      const elPrem = row.querySelector(".premium");
      if (elPrem) {
        const nav = toNum(data["NAV"]);
        const close = toNum(data["TDD_CLSPRC"]);
        elPrem.textContent =
          !isNaN(nav) && nav !== 0 && !isNaN(close)
            ? (((close - nav) / nav) * 100).toFixed(2) + "%"
            : "-";
      }
    });

    // ✅ 정렬 기능 추가
    const table = document.querySelector("table");
    const tbody = table.querySelector("tbody");
    const headers = Array.from(table.querySelectorAll("th"));

    const ascPreferred = ["종목명", "실부담비용", "괴리율"];

    headers.forEach((th, idx) => {
      th.style.cursor = "pointer";
      let asc = ascPreferred.includes(th.textContent.trim()); // 초기 방향 설정

      th.addEventListener("click", () => {
        const rowsArr = Array.from(tbody.querySelectorAll("tr"));
        const isNumeric = (val) => !isNaN(parseFloat(val)) && isFinite(val);

        rowsArr.sort((a, b) => {
          const aText = a.children[idx].textContent.replace("%", "").trim();
          const bText = b.children[idx].textContent.replace("%", "").trim();

          if (isNumeric(aText) && isNumeric(bText)) {
            return asc ? aText - bText : bText - aText;
          } else {
            return asc
              ? aText.localeCompare(bText, "ko")
              : bText.localeCompare(aText, "ko");
          }
        });

        // 정렬된 행 재삽입
        rowsArr.forEach((r) => tbody.appendChild(r));
        asc = !asc; // 다음 클릭 시 방향 반전
      });
    });
  });
</script>

  </main>
</html>
