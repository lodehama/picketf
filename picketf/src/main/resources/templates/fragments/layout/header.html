<div th:fragment="header">
  <header class="app-header">
    <div class="app-header__inner">

      <!-- 좌측 -->
      <a href="/" class="app-logo">
        <img src="/img/favicon.svg" alt="Pick ETF" class="app-logo__icon">
        <span class="app-logo__text">PICK ETF</span>
      </a>

      <!-- 중앙 -->
      <nav class="app-nav">
        <a href="/snp" class="app-nav__link">S&P 500</a>
        <a href="/qqq" class="app-nav__link">나스닥 100</a>
        <a href="/m7" class="app-nav__link">빅테크 M10</a>
        <a href="/gld" class="app-nav__link">금</a>
      </nav>

      <!-- 우측 -->
      <div class="app-header__right">
        <a href="/login" class="app-nav__link" sec:authorize="isAnonymous()">로그인</a>
        <a href="/signup" class="app-nav__signup" sec:authorize="isAnonymous()">계정 만들기</a>

        <div class="app-user-menu" sec:authorize="isAuthenticated()">
          <button type="button" class="app-user-menu__trigger" id="userMenuBtn">
            <img src="/img/person-square.svg" alt="사용자 메뉴" class="app-user-menu__icon">
          </button>

          <div class="app-user-menu__dropdown" id="userMenuDropdown">
            <a href="/mypage" class="app-user-menu__item">마이 페이지</a>

            <form action="/logout" method="post" class="app-user-menu__form">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <button type="submit" class="app-user-menu__item app-user-menu__logout">로그아웃</button>
            </form>
            
            <a href="#" class="app-user-menu__item disabled-link">설정</a>
          </div>
        </div>
      </div>
    </div>
  </header>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const menuWrap = document.querySelector(".app-user-menu");
      const menuBtn = document.getElementById("userMenuBtn");
      const dropdown = document.getElementById("userMenuDropdown");

      if (!menuWrap || !menuBtn || !dropdown) return;

      menuBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        dropdown.classList.toggle("is-open");
      });

      document.addEventListener("click", function (e) {
        if (!menuWrap.contains(e.target)) {
          dropdown.classList.remove("is-open");
        }
      });

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") {
          dropdown.classList.remove("is-open");
        }
      });
    });
  </script>
</div>
