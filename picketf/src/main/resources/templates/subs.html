<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout/layout.html}">

<head>
  <title>구독 서비스 관리</title>
</head>

<body>
  <main layout:fragment="content">
    <div class="container py-3">

      <!-- 페이지 제목 -->
      <h5 class="mb-3">내 구독 서비스</h5>

      <!-- 상단 요약 -->
      <div class="d-flex justify-content-between align-items-center mb-2 small text-muted">
        <div>
          Recent Subscriptions
        </div>
        <div>
          총 <span th:text="${subsCount}">0</span>개
        </div>
      </div>

      <!-- 메인 카드 -->
      <div class="card">
        <div class="card-body p-0">

          <!-- 비어 있을 때 -->
          <div th:if="${#lists.isEmpty(subsList)}" class="text-muted text-center py-4">
            아직 등록된 구독이 없습니다.
          </div>

          <!-- 구독 리스트 -->
          <div th:if="${!#lists.isEmpty(subsList)}">

            <div th:each="s : ${subsList}"
              class="d-flex justify-content-between align-items-center px-3 py-2 border-bottom">

              <!-- 왼쪽: 아이콘 + 이름/설명 -->
              <div class="d-flex align-items-center gap-2">

                <!-- 아이콘 -->
                <img th:if="${s.subsIcon != null and !s.subsIcon.isEmpty()}"
                  th:src="@{/img/subs/{icon}(icon=${s.subsIcon})}" style="width:32px;height:32px;object-fit:contain;margin-right:8px;">

                <!-- 아이콘 없을 때 기본 이미지 -->
                <img th:if="${s.subsIcon == null or s.subsIcon.isEmpty()}" th:src="@{/img/subs/default.svg}"
                  style="width:32px;height:32px;object-fit:contain;margin-right:8px;">

                <div>
                  <div class="fw-semibold" th:text="${s.subsName}">서비스 이름</div>
                  <small class="text-muted">
                    <span th:text="${s.subsType}">타입</span>
                    · 매월 <span th:text="${s.subsBillingDay}">1</span>일
                    · 시작: <span th:text="${s.subsStartDate}">2025-12-03</span>
                  </small>
                </div>
              </div>

              <!-- 오른쪽: 가격 + 상태 -->
              <div class="text-end">
                <div class="fw-semibold" th:text="${#numbers.formatInteger(s.subsPrice, 0, 'COMMA')} + ' 원'">
                  15,900 원
                </div>
                <small th:text="${s.subsActive == 1 ? '구독중' : '해지'}"
                  th:classappend="${s.subsActive == 1} ? ' text-success' : ' text-muted'">
                  구독중
                </small>
              </div>

            </div>

          </div>

        </div>
      </div>

    </div>
  </main>
</body>

</html>
