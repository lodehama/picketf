<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml">
</head>

<body>
  <div class="app-wrapper d-flex">

    <!-- 좌측 메뉴 (사이드바) -->
    <aside class="app-sidebar">
      <nav class="sidebar-nav">

        <div class="sidebar-section-title">OVERVIEW</div>

        <a th:href="@{/dashboard}" class="sidebar-link">
          <i class="bi bi-speedometer2 me-2"></i> Dashboard
        </a>

        <a th:href="@{/qqq}" class="sidebar-link">
          <i class="bi bi-graph-up-arrow me-2"></i> Nasdaq 100
        </a>
        
        <a th:href="@{/portfolio}" class="sidebar-link">
          <i class="bi bi-wallet2 me-2"></i> Portfolio
        </a>
        
        <a th:href="@{/portfolio}" class="sidebar-link">
          <i class="bi bi-wallet2 me-2"></i> 자료 출처
        </a>
        
        <a th:href="@{/subs}" class="sidebar-link">
          <i class="bi bi-bar-chart-line me-2"></i> 구독중
        </a>

        <a th:href="@{/devlog}" class="sidebar-link">
          <i class="bi bi-wallet2 me-2"></i> Dev Log
        </a>

      </nav>
    </aside>

    <!-- 우측 메인영역 -->
    <div class="app-main flex-grow-1 d-flex flex-column">

      <!-- 헤더 -->
      <div th:replace="~{fragments/layout/header.html :: header}"></div>

      <!-- 본문 콘텐츠 -->
      <main layout:fragment="content"></main>

      <!-- 푸터 -->
      <div th:replace="~{fragments/layout/footer.html :: footer}"></div>

      <!-- 공통 Chart.js -->
      <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
      <!-- <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script> -->


      <!-- 개별 페이지 스크립트 삽입 위치 -->
      <th:block layout:fragment="script"></th:block>

    </div>
</body>

</html>
