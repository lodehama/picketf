<!DOCTYPE html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout/layout.html}"
>
  <head>
    <title>메인 페이지</title>
  </head>
  <main layout:fragment="content">
    <div class="container">
      <div class="row text-center">
        <div class="col-1 border">1</div>
        <div class="col-1 border">2</div>
        <div class="col-1 border">3</div>
        <div class="col-1 border">4</div>
        <div class="col-1 border">5</div>
        <div class="col-1 bg-warning border">6</div>
        <div class="col-1 bg-warning border">7</div>
        <div class="col-1 border">8</div>
        <div class="col-1 border">9</div>
        <div class="col-1 border">10</div>
        <div class="col-1 border">11</div>
        <div class="col-1 border">12</div>
      </div>
    </div>
    <div
      class="bg-white border-bottom py-2 d-flex justify-content-center gap-4 small fw-semibold"
    >
      123123
      <div class="kv-muted" id="updated">–</div>
    </div>
    <!-- 그리드 레이아웃 -->
    <style>
      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(260px, 1fr));
        gap: 12px;
      }
      .card {
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 12px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        margin: 6px 0;
        font-size: 14px;
      }
      .name {
        font-weight: 700;
        margin-bottom: 6px;
      }
      @media (max-width: 900px) {
        .grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 520px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>

    <div class="grid" id="stock-grid">
      <!-- data-code에 종목코드만 넣으면 됨 -->
      <div class="card" data-code="005930">
        <div class="name">-</div>
        <div class="row"><span>현재가</span><span class="price">-</span></div>
        <div class="row"><span>시가총액</span><span class="mcap">-</span></div>
        <div class="row"><span>PER</span><span class="per">-</span></div>
        <div class="row"><span>PBR</span><span class="pbr">-</span></div>
      </div>

      <div class="card" data-code="000660">
        <div class="name">-</div>
        <div class="row"><span>현재가</span><span class="price">-</span></div>
        <div class="row"><span>시가총액</span><span class="mcap">-</span></div>
        <div class="row"><span>PER</span><span class="per">-</span></div>
        <div class="row"><span>PBR</span><span class="pbr">-</span></div>
      </div>

      <div class="card" data-code="379800">
        <div class="name">-</div>
        <div class="row"><span>현재가</span><span class="price">-</span></div>
        <div class="row"><span>시가총액</span><span class="mcap">-</span></div>
        <div class="row"><span>PER</span><span class="per">-</span></div>
        <div class="row"><span>PBR</span><span class="pbr">-</span></div>
      </div>
      <div class="card" data-code="035420">... 동일 구조 ...</div>
      <!-- 필요한 만큼 계속 추가 -->
    </div>
    <script>
      const cards = Array.from(document.querySelectorAll(".card[data-code]"));
      const codes = cards.map((el) => el.dataset.code).join(",");

      async function refreshBatch() {
        try {
          const res = await fetch(`/api/stocks?codes=${codes}`, {
            cache: "no-store",
          });
          // ❗응답 코드가 200이 아니어도 무시하고 아래로 진행
          const list = await res.json().catch(() => []);
          const map = Object.fromEntries(list.map((x) => [x.code, x]));

          for (const card of cards) {
            const d = map[card.dataset.code];
            if (!d) continue;
            card.querySelector(".name").textContent = d.name ?? "-";
            card.querySelector(".price").textContent = d.price ?? "-";
            card.querySelector(".mcap").textContent = d.marketCap ?? "-";
            card.querySelector(".per").textContent = d.per ?? "-";
            card.querySelector(".pbr").textContent = d.pbr ?? "-";
          }
        } catch (e) {
          console.error("데이터 불러오기 실패 (무시)", e);
        } finally {
          // ✅ 성공/실패 상관없이 시각 출력
          const el = document.getElementById("updated");
          if (el) {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, "0");
            const m = String(now.getMinutes()).padStart(2, "0");
            el.textContent = `${h}시 ${m}분 마지막 갱신`;
          }
        }
      }

      refreshBatch();
      setInterval(refreshBatch, 3000);
    </script>
  </main>
</html>
