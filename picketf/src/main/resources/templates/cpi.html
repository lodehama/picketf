<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout/layout.html}">

<head>
  <title>화폐가치 계산</title>
</head>

<body>
  <main layout:fragment="content">
    <div class="container py-3">
      <h5 class="mb-3 text-center fw-bold">화폐가치 계산기</h5>
      <div class="cpi-wrap">

        <!-- 폼 -->
        <div class="cpi-row">
          <div class="cpi-label">기준시점</div>
          <div class="cpi-controls">
            <select id="baseYear" class="cpi-select">
              <option selected>2025</option>
              <option>2024</option>
              <option>2023</option>
              <option>2022</option>
              <option>2021</option>
              <option>2020</option>
              <option>2019</option>
              <option>2018</option>
              <option>2017</option>
              <option>2016</option>
              <option>2015</option>
              <option>2014</option>
              <option>2013</option>
              <option>2012</option>
              <option>2011</option>
              <option>2010</option>
              <option>2009</option>
              <option>2008</option>
              <option>2007</option>
              <option>2006</option>
              <option>2005</option>
              <option>2004</option>
              <option>2003</option>
              <option>2002</option>
              <option>2001</option>
            </select>
          </div>
        </div>

        <div class="cpi-row">
          <div class="cpi-label">비교시점</div>
          <div class="cpi-controls">
            <select id="compareYear" class="cpi-select">
              <option>2024</option>
              <option>2023</option>
              <option>2022</option>
              <option>2021</option>
              <option>2020</option>
              <option>2019</option>
              <option>2018</option>
              <option>2017</option>
              <option>2016</option>
              <option selected>2015</option>
              <option>2014</option>
              <option>2013</option>
              <option>2012</option>
              <option>2011</option>
              <option>2010</option>
              <option>2009</option>
              <option>2008</option>
              <option>2007</option>
              <option>2006</option>
              <option>2005</option>
              <option>2004</option>
              <option>2003</option>
              <option>2002</option>
              <option>2001</option>
              <option>2000</option>
            </select>
            <button type="button" id="btnRun" class="cpi-run btn btn-success">실행</button>

          </div>
        </div>
        <div class="cpi-divider"></div>

        <!-- 기준시점금액 (기본 10,000원 / 입력 가능) -->
        <div class="cpi-row">
          <div class="cpi-label">기준시점 금액</div>
          <div class="cpi-controls">
            <input id="baseAmount" class="cpi-input" type="text" min="0" step="100" value="10000" />
            <span class="cpi-unit">원</span>
          </div>
        </div>

        <!-- 비교시점금액 (초기 비움 / 나중에 mapper로 채울 예정) -->
        <div class="cpi-row">
          <div class="cpi-label">비교시점 금액</div>
          <div class="cpi-value">
            <div class="cpi-value-box cpi-value-box--empty"></div>
          </div>
        </div>

        <div class="cpi-row">
          <div class="cpi-label">물가 상승률</div>
          <div class="cpi-value">
            <div class="cpi-value-box"></div>
          </div>
        </div>

        <div class="cpi-row">
          <div class="cpi-label">물가 상승률 (평균)</div>
          <div class="cpi-value">
            <div class="cpi-value-box"></div>
          </div>
        </div>
        <div class="cpi-divider"></div>

        <!-- 최저 -->
        <div class="cpi-row">
          <div class="cpi-label">기준시점 최저시급</div>
          <div class="cpi-value">
            <output id="baseMinWage" class="cpi-value-box form-control"></output>
          </div>
        </div>

        <div class="cpi-row">
          <div class="cpi-label">비교시점 최저시급</div>
          <div class="cpi-value">
            <output id="compareMinWage" class="cpi-value-box form-control"></output>
          </div>
        </div>

        <div class="cpi-row">
          <div class="cpi-label">최저시급 상승률</div>
          <div class="cpi-value">
            <output id="minWageGrowth" class="cpi-value-box form-control"></output>
          </div>
        </div>

        <div class="cpi-row">
          <div class="cpi-label">최저시급 상승률 (평균)</div>
          <div class="cpi-value">
            <output id="minWageCagr" class="cpi-value-box form-control"></output>
          </div>
        </div>
      </div>
      <th:block layout:fragment="script">
        <script>
          document.addEventListener("DOMContentLoaded", () => {

            /* ===============================
               1. 기준시점 금액 콤마 처리
               =============================== */
            const baseAmountInput = document.getElementById("baseAmount");

            if (baseAmountInput) {
              const formatNumber = (value) => {
                return value
                  .replace(/[^0-9]/g, "")
                  .replace(/\B(?=(\d{3})+(?!\d))/g, ",");
              };

              // 최초 로딩 시 포맷
              baseAmountInput.value = formatNumber(baseAmountInput.value);

              // 입력 시마다 콤마 적용
              baseAmountInput.addEventListener("input", () => {
                const raw = baseAmountInput.value.replace(/,/g, "");
                baseAmountInput.value = formatNumber(raw);
              });

              // 필요하면 숫자값으로 쓰기
              window.getBaseAmountNumber = () => {
                return Number(baseAmountInput.value.replace(/,/g, ""));
              };
            }

            /* ===============================
               2. 실행 버튼 → 최저시급 계산
               =============================== */
            const btnRun = document.getElementById("btnRun");

            if (btnRun) {
              const fmtMoney = (n) => Number(n).toLocaleString();
              const fmtPct = (r) => (r * 100).toFixed(2) + "%";

              btnRun.addEventListener("click", async () => {
                const baseYear = document.getElementById("baseYear").value;
                const compareYear = document.getElementById("compareYear").value;

                const res = await fetch(
                  `/cpi/minwage?baseYear=${baseYear}&compareYear=${compareYear}`
                );

                if (!res.ok) {
                  alert("데이터 조회 실패");
                  return;
                }

                const data = await res.json();

                document.getElementById("baseMinWage").textContent = fmtMoney(data.baseMinWage);
                document.getElementById("compareMinWage").textContent = fmtMoney(data.compareMinWage);
                document.getElementById("minWageGrowth").textContent = fmtPct(data.growthRate);
                document.getElementById("minWageCagr").textContent = fmtPct(data.cagrRate);
              });
            }

          });
        </script>
      </th:block>
  </main>
</body>

</html>
