<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout/layout.html}">

<head>
  <title>마이 페이지</title>
  <meta name="_csrf" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>

<main class="login-layout-main auth-page signup-main" layout:fragment="content">
  <div class="mypage-wrap">

    <h2 class="mypage-title">마이 페이지</h2>

    <style>
      .mypage-title {
        text-align: center;
        margin-bottom: 36px;
      }
    </style>

    <section class="mypage-profile-card">
      <div class="mypage-profile-header">
        <button type="button" class="mypage-tab-btn active" data-tab="profile">프로필</button>
        <button type="button" class="mypage-tab-btn" data-tab="account">계정</button>
      </div>
    </section>

    <div class="mypage-content-box">
      <hr class="my-4" />

      <!-- 프로필 탭 -->
      <section id="profileTab" class="mypage-tab-content active">
        <section class="mypage-info-section">
          <div class="mypage-info-row">
            <label class="mypage-label">아이디</label>
            <span th:text="${loginUser.us_id}"></span>
          </div>

          <div class="mypage-info-row">
            <label class="mypage-label">이메일</label>
            <span th:text="${loginUser.us_email}"></span>
          </div>
        </section>

        <section class="mypage-info-section">
          <form action="/mypage/update" method="post" class="mypage-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="mypage-nickname-row">
              <label for="newNickname" class="mypage-label">닉네임</label>

              <div class="mypage-nickname-current" th:text="${loginUser.us_nickname}"></div>

              <div class="mypage-nickname-box">
                <input type="text" id="newNickname" name="us_nickname" class="mypage-nickname-input" placeholder="새 닉네임"
                  maxlength="10" th:data-current-nickname="${loginUser.us_nickname}">
                <div id="nicknameMessage" class="input-message"></div>
              </div>

              <button type="submit" id="nicknameSaveBtn" class="mypage-save-btn" disabled>저장</button>
            </div>
          </form>
        </section>
      </section>

      <!-- 계정 탭 -->
      <section id="accountTab" class="mypage-tab-content">
        <section class="mypage-info-section">
          <form action="/mypage/password" method="post" class="mypage-password-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="mypage-password-row">
              <label class="mypage-label">비밀번호</label>

              <div class="mypage-password-current">••••••••</div>

              <div class="mypage-password-box">
                <input type="password" id="newPassword" name="newPassword" class="mypage-password-input"
                  placeholder="새 비밀번호">
                <div id="passwordMessage" class="input-message"></div>
              </div>

              <button type="submit" id="passwordSaveBtn" class="mypage-save-btn" disabled>
                비밀번호 변경
              </button>
            </div>
          </form>

          <form action="/mypage/delete" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="mypage-delete-btn">회원 탈퇴</button>
          </form>

        </section>
      </section>
    </div>

    <!-- 스크립트 -->
    <script>
      const tabButtons = document.querySelectorAll('.mypage-tab-btn');
      const profileTab = document.getElementById('profileTab');
      const accountTab = document.getElementById('accountTab');

      tabButtons.forEach(button => {
        button.addEventListener('click', function () {
          tabButtons.forEach(btn => btn.classList.remove('active'));
          this.classList.add('active');

          const tab = this.dataset.tab;

          if (tab === 'profile') {
            profileTab.classList.add('active');
            accountTab.classList.remove('active');
          } else {
            accountTab.classList.add('active');
            profileTab.classList.remove('active');
          }
        });
      });

      // ======================
      // 닉네임 로직
      // ======================
      const nicknameInput = document.getElementById("newNickname");
      const nicknameMessage = document.getElementById("nicknameMessage");
      const nicknameSaveBtn = document.getElementById("nicknameSaveBtn");
      const currentNickname = nicknameInput.dataset.currentNickname;

      let nicknameTimer;
      let isNicknameValid = false;

      function updateNicknameButton() {
        nicknameSaveBtn.disabled = !isNicknameValid;
      }

      function validateNicknameFormat(value) {
        const regex = /^[가-힣a-zA-Z0-9]{2,8}$/;

        if (!regex.test(value)) {
          return {
            valid: false,
            message: "2~8자, 한글/영문/숫자만 가능합니다."
          };
        }

        return { valid: true };
      }

      nicknameInput.addEventListener("input", function () {
        clearTimeout(nicknameTimer);

        const value = nicknameInput.value.trim();

        if (value === "") {
          nicknameMessage.textContent = "";
          nicknameMessage.className = "input-message";
          isNicknameValid = false;
          updateNicknameButton();
          return;
        }

        const formatResult = validateNicknameFormat(value);

        if (!formatResult.valid) {
          nicknameMessage.textContent = formatResult.message;
          nicknameMessage.className = "input-message error";
          isNicknameValid = false;
          updateNicknameButton();
          return;
        }

        if (value === currentNickname.trim()) {
          nicknameMessage.textContent = "현재 닉네임과 동일합니다.";
          nicknameMessage.className = "input-message";
          isNicknameValid = false;
          updateNicknameButton();
          return;
        }

        nicknameTimer = setTimeout(async function () {
          try {
            const response = await fetch(`/mypage/nickname/check?nickname=${encodeURIComponent(value)}`);
            const data = await response.json();

            if (!data.valid) {
              nicknameMessage.textContent = data.message;
              nicknameMessage.className = "input-message error";
              isNicknameValid = false;
            } else if (data.same) {
              nicknameMessage.textContent = data.message;
              nicknameMessage.className = "input-message";
              isNicknameValid = false;
            } else {
              nicknameMessage.textContent = data.message;
              nicknameMessage.className = "input-message success";
              isNicknameValid = true;
            }

            updateNicknameButton();
          } catch (e) {
            nicknameMessage.textContent = "닉네임 확인 중 오류가 발생했습니다.";
            nicknameMessage.className = "input-message error";
            isNicknameValid = false;
            updateNicknameButton();
          }
        }, 300);
      });

      updateNicknameButton();

      // ======================
      // 비밀번호 로직
      // ======================
      const newPasswordInput = document.getElementById("newPassword");
      const passwordMessage = document.getElementById("passwordMessage");
      const passwordSaveBtn = document.getElementById("passwordSaveBtn");

      let isPasswordValid = false;

      function validatePasswordFormat(value) {
        const regex = /^[A-Za-z0-9!@#$%^&*]{8,20}$/;

        if (!regex.test(value)) {
          return {
            valid: false,
            message: "8~20자, 영문/숫자/특수문자만 가능합니다."
          };
        }

        return { valid: true };
      }

      function updatePasswordButton() {
        passwordSaveBtn.disabled = !isPasswordValid;
      }

      function validatePasswordForm() {
        const newPassword = newPasswordInput.value.trim();

        if (newPassword === "") {
          passwordMessage.textContent = "";
          passwordMessage.className = "input-message";
          isPasswordValid = false;
          updatePasswordButton();
          return;
        }

        const result = validatePasswordFormat(newPassword);

        if (!result.valid) {
          passwordMessage.textContent = result.message;
          passwordMessage.className = "input-message error";
          isPasswordValid = false;
          updatePasswordButton();
          return;
        }

        passwordMessage.textContent = "사용 가능한 비밀번호입니다.";
        passwordMessage.className = "input-message success";
        isPasswordValid = true;
        updatePasswordButton();
      }

      newPasswordInput.addEventListener("input", validatePasswordForm);

      updatePasswordButton();
    </script>
</main>

</html>
