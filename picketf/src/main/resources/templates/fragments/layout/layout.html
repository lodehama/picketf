<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml">

  <!-- 페이지 폰트 일괄 수정 -->
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />

  <!-- 페이지 제목을 "기능명 | Pick ETF" 형식으로 통일 -->
  <title layout:title-pattern="$CONTENT_TITLE | PICK ETF">PICK ETF</title>

</head>

<body>
  <div class="app-wrapper d-flex">

    <aside class="app-sidebar">

      <!-- 위쪽: 일반 메뉴 (스크롤 영역) -->
      <nav class="sidebar-nav">

        <div class="sidebar-section-title">로그인 기능</div>

        <a th:href="@{/isa}" class="sidebar-link">
          <i class="bi bi-house-door me-2"></i> ISA 계좌 관리
        </a>

        <a th:href="@{/subs}" class="sidebar-link">
          <i class="bi bi-bar-chart-line me-2"></i> 구독 관리
        </a>

        <div class="sidebar-section-title">계산기</div>

        <a th:href="@{/isa/tax}" class="sidebar-link">
          <i class="bi bi-wallet2 me-2"></i> ISA 절세 계산
        </a>

        <a th:href="@{/cpi}" class="sidebar-link">
          <i class="bi bi-wallet2 me-2"></i> 화폐가치 계산
        </a>

        <div class="sidebar-section-title">기타</div>

        <a th:href="@{/sources}" class="sidebar-link">
          <i class="bi bi-wallet2 me-2"></i> 자료 출처
        </a>

        <!-- <a th:href="@{/fees}" class="sidebar-link">
          <i class="bi bi-wallet2 me-2"></i> 증권사 수수료 비교
        </a> -->
      </nav>

      <!-- 아래: 고정 영역 (Settings / Help) -->
      <div class="sidebar-footer">
        <a th:href="@{/devlog}" class="sidebar-link">
          <i class="bi bi-pencil-fill"></i>
          <div style="margin-right: 4px;"></div> 개발로그
        </a>
        <a href="https://naver.me/GLhvF3qz" class="sidebar-link" target="_blank">
          <i class="bi bi-question-circle me-2"></i> 문의하기
        </a>
        <a th:href="@{/privacy-policy}" class="sidebar-link">
          <i class="bi-file-earmark-lock"></i>
          <div style="margin-right: 4px;"></div> 개인정보처리방침
        </a>
      </div>

    </aside>

    <nav class="mobile-bottom-nav" aria-label="모바일 주요 메뉴">
      <a th:href="@{/isa/tax}" class="mobile-bottom-nav__item">
        <i class="bi bi-calculator"></i>
        <span>절세 계산</span>
      </a>
      <a th:href="@{/cpi}" class="mobile-bottom-nav__item">
        <i class="bi bi-cash-coin"></i>
        <span>화폐가치</span>
      </a>
      <a th:href="@{/isa}" class="mobile-bottom-nav__item">
        <i class="bi bi-house-door"></i>
        <span>ISA 계좌</span>
      </a>
      <a th:href="@{/subs}" class="mobile-bottom-nav__item">
        <i class="bi bi-bar-chart-line"></i>
        <span>구독 관리</span>
      </a>
      <button class="mobile-bottom-nav__item" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileMoreSheet"
        aria-controls="mobileMoreSheet">
        <i class="bi bi-three-dots"></i>
        <span>더보기</span>
      </button>
    </nav>

    <div class="offcanvas offcanvas-bottom mobile-more-sheet" tabindex="-1" id="mobileMoreSheet"
      aria-labelledby="mobileMoreSheetLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="mobileMoreSheetLabel">더보기</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="닫기"></button>
      </div>
      <div class="offcanvas-body">
        <div class="mobile-more-sheet__account" sec:authorize="isAuthenticated()">
          <a th:href="@{/mypage}" class="mobile-more-sheet__link mobile-more-sheet__link--account">
            <img src="/img/person-square.svg" alt="사용자 메뉴" class="mobile-more-sheet__avatar">
            <span>마이 페이지</span>
          </a>
          <form action="/logout" method="post" class="mobile-more-sheet__form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="mobile-more-sheet__link mobile-more-sheet__button">
              <i class="bi bi-door-open"></i>
              <span>로그아웃</span>
            </button>
          </form>
        </div>
        <div class="mobile-more-sheet__account" sec:authorize="isAnonymous()">
          <a th:href="@{/login}" class="mobile-more-sheet__link">
            <i class="bi bi-person"></i>
            <span>로그인</span>
          </a>
          <a th:href="@{/signup}" class="mobile-more-sheet__link">
            <i class="bi bi-person-plus"></i>
            <span>계정 만들기</span>
          </a>
        </div>
        
        <a th:href="@{/devlog}" class="mobile-more-sheet__link">
          <i class="bi bi-pencil-fill"></i>
          <span>개발로그</span>
        </a>
        <a th:href="@{/privacy-policy}" class="mobile-more-sheet__link">
          <i class="bi bi-file-earmark-lock"></i>
          <span>개인정보처리방침</span>
        </a>

        <div class="mobile-more-sheet__section">
          <a href="https://naver.me/GLhvF3qz" class="mobile-more-sheet__link" target="_blank">
            <i class="bi bi-question-circle"></i>
            <span>문의하기</span>
          </a>
          <a th:href="@{/sources}" class="mobile-more-sheet__link">
            <i class="bi bi-folder2-open"></i>
            <span>자료 출처</span>
          </a>
        </div>
      </div>
    </div>

    <!-- 우측 메인영역 -->
    <script>
      (function () {
        function closeMobileMoreSheetFromBackdrop(event) {
          if (!event.target.classList || !event.target.classList.contains("offcanvas-backdrop")) {
            return;
          }

          const sheet = document.getElementById("mobileMoreSheet");
          if (!sheet || !sheet.classList.contains("show")) {
            return;
          }

          bootstrap.Offcanvas.getOrCreateInstance(sheet).hide();
        }

        document.addEventListener("click", closeMobileMoreSheetFromBackdrop, true);
        document.addEventListener("touchstart", closeMobileMoreSheetFromBackdrop, true);
      })();
    </script>

    <div class="app-main flex-grow-1 d-flex flex-column">

      <!-- 헤더 -->
      <div th:replace="~{fragments/layout/header.html :: header}"></div>

      <!-- 본문 콘텐츠 -->
      <main layout:fragment="content"></main>

      <!-- 푸터 -->
      <div th:replace="~{fragments/layout/footer.html :: footer}"></div>

      <!-- 공통 Chart.js -->
      <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
      <!-- <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script> -->


      <!-- 개별 페이지 스크립트 삽입 위치 -->
      <th:block layout:fragment="script"></th:block>

    </div>
</body>

</html>
