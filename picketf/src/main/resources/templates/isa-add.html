<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout/layout.html}">

<head>
  <title>ISA 계좌 개설하기</title>
</head>

<main layout:fragment="content">
  <div class="container py-3">
    <h2>ISA 계좌 개설하기</h2>

    <form method="post" th:action="@{/isa/add}">
      <!-- Spring Security CSRF 대응 -->
      <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />


      <div class="mb-3">
        <label class="form-label">개설 연도</label>
        <input type="text" name="opened_year" class="form-control" placeholder="2026" required inputmode="numeric"
          maxlength="4" pattern="[0-9]{4}" />
      </div>

      <div class="mb-3">
        <label class="form-label d-block">계좌 유형</label>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="accountType" id="typeNormal" value="NORMAL" checked />
          <label class="form-check-label" for="typeNormal">일반형</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="accountType" id="typeLowIncome" value="LOW_INCOME" />
          <label class="form-check-label" for="typeLowIncome">
            서민형 (직년연도 총급여 5000만원 이하 또는 종합소득금액 3800만원 이하인 자)
          </label>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">초기 납입금액</label>
        <input type="number" name="initialDeposit" class="form-control" placeholder="0 ~ 20,000,000" required min="0" />
        <small id="limitHelp" class="text-muted"></small>
      </div>

      <button type="submit" class="btn btn-primary">추가</button>

    </form>
  </div>
</main>
<th:block layout:fragment="script">
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const yearInput = document.querySelector("input[name='opened_year']");
      const amountInput = document.querySelector("input[name='initialDeposit']");

      // 기준값
      const CURRENT_YEAR = new Date().getFullYear();
      const YEARLY_LIMIT = 20_000_000;   // 연 2천만
      const MAX_TOTAL = 100_000_000;     // 최대 1억

      // 개설 연도 기준 최대 납입 가능 금액 계산
      function calcMaxAmount(openedYear) {
        if (!openedYear || openedYear > CURRENT_YEAR) {
          return YEARLY_LIMIT;
        }

        const years = CURRENT_YEAR - openedYear + 1;
        return Math.min(years * YEARLY_LIMIT, MAX_TOTAL);
      }

      // 입력값 검증 + 제한 적용
      function applyLimit() {
        const openedYear = parseInt(yearInput.value, 10);

        // 연도 미입력 / 숫자 아님 → 기본 2천
        if (isNaN(openedYear)) {
          amountInput.max = YEARLY_LIMIT;
          amountInput.placeholder = "0 ~ 20,000,000";
          return;
        }

        const maxAmount = calcMaxAmount(openedYear);

        // max / placeholder 동기화
        amountInput.max = maxAmount;
        amountInput.placeholder = `0 ~ ${maxAmount.toLocaleString()}`;

        // 초과 입력 시 자동 보정
        if (amountInput.value && Number(amountInput.value) > maxAmount) {
          amountInput.value = maxAmount;
        }
      }

      // 이벤트 바인딩
      yearInput.addEventListener("input", applyLimit);

      // 최초 1회 실행 (뒤로가기 / 자동완성 대응)
      applyLimit();
    });
  </script>
</th:block>

</html>
