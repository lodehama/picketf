<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout/layout.html}">

<head>
  <title>화폐가치 계산</title>
</head>

<body>
  <main layout:fragment="content">
    <div class="container py-3">
      <h5 class="mb-3 text-center fw-bold">화폐가치 계산기</h5>
      <div class="cpi-wrap">

        <!-- 폼 -->
        <div class="cpi-row">
          <div class="cpi-label">기준시점</div>
          <div class="cpi-controls">
            <select class="cpi-select">
              <option selected>2025</option>
              <option>2024</option>
              <option>2023</option>
              <option>2022</option>
              <option>2021</option>
              <option>2020</option>
              <option>2019</option>
              <option>2018</option>
              <option>2017</option>
              <option>2016</option>
              <option>2015</option>
              <option>2014</option>
              <option>2013</option>
              <option>2012</option>
              <option>2011</option>
              <option>2010</option>
              <option>2009</option>
              <option>2008</option>
              <option>2007</option>
              <option>2006</option>
              <option>2005</option>
              <option>2004</option>
              <option>2003</option>
              <option>2002</option>
              <option>2001</option>
            </select>
          </div>
        </div>

        <div class="cpi-row">
          <div class="cpi-label">비교시점</div>
          <div class="cpi-controls">
            <select class="cpi-select">
              <option>2024</option>
              <option>2023</option>
              <option>2022</option>
              <option>2021</option>
              <option>2020</option>
              <option>2019</option>
              <option>2018</option>
              <option>2017</option>
              <option>2016</option>
              <option selected>2015</option>
              <option>2014</option>
              <option>2013</option>
              <option>2012</option>
              <option>2011</option>
              <option>2010</option>
              <option>2009</option>
              <option>2008</option>
              <option>2007</option>
              <option>2006</option>
              <option>2005</option>
              <option>2004</option>
              <option>2003</option>
              <option>2002</option>
              <option>2001</option>
              <option>2000</option>
            </select>
            <button class="cpi-run" type="button">실행</button>
          </div>
        </div>
        <div class="cpi-divider"></div>

        <!-- 기준시점금액 (기본 10,000원 / 입력 가능) -->
        <div class="cpi-row">
          <div class="cpi-label">기준시점 금액</div>
          <div class="cpi-controls">
            <input id="baseAmount" class="cpi-input" type="text" min="0" step="100" value="10000" />
            <span class="cpi-unit">원</span>
          </div>
        </div>

        <!-- 비교시점금액 (초기 비움 / 나중에 mapper로 채울 예정) -->
        <div class="cpi-row">
          <div class="cpi-label">비교시점 금액</div>
          <div class="cpi-value">
            <div class="cpi-value-box cpi-value-box--empty"></div>
          </div>
        </div>

        <div class="cpi-row">
          <div class="cpi-label">물가 상승률</div>
          <div class="cpi-value">
            <div class="cpi-value-box"></div>
          </div>
        </div>

        <div class="cpi-row">
          <div class="cpi-label">물가 상승률 (평균)</div>
          <div class="cpi-value">
            <div class="cpi-value-box"></div>
          </div>
        </div>
        <div class="cpi-divider"></div>

        <!-- 최저 -->
        <div class="cpi-row">
          <div class="cpi-label">기준시점 최저시급</div>
          <div class="cpi-value">
            <div id="baseMinWage" class="cpi-value-box"></div>
          </div>
        </div>

        <div class="cpi-row">
          <div class="cpi-label">비교시점 최저시급</div>
          <div class="cpi-value">
            <div id="compareMinWage" class="cpi-value-box"></div>
          </div>
        </div>

        <div class="cpi-row">
          <div class="cpi-label">최저시급 상승률</div>
          <div class="cpi-value">
            <div id="minWageRate" class="cpi-value-box"></div>
          </div>
        </div>

        <div class="cpi-row">
          <div class="cpi-label">최저시급 상승률 (평균)</div>
          <div class="cpi-value">
            <div id="avgMinWageRate" class="cpi-value-box"></div>
          </div>
        </div>
      </div>
      <th:block layout:fragment="script">
        <script>
          // 기준시점금액 3자리 콤마
          const input = document.getElementById("baseAmount");

          // 숫자 → 콤마 포맷
          function formatNumber(value) {
            return value
              .replace(/[^0-9]/g, "")           // 숫자만 남기고 제거
              .replace(/\B(?=(\d{3})+(?!\d))/g, ",");
          }

          // 최초 로딩 시 10,000으로 포맷
          input.value = formatNumber(input.value);

          // 입력할 때마다 콤마 적용
          input.addEventListener("input", (e) => {
            const cursorPosition = input.selectionStart;
            const rawValue = input.value.replace(/,/g, "");
            input.value = formatNumber(rawValue);
          });

          // 계산할 때 숫자로 쓰고 싶으면
          function getBaseAmountNumber() {
            return Number(input.value.replace(/,/g, ""));
          }
        </script>
      </th:block>
  </main>
</body>

</html>
