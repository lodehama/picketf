<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout/layout.html}">

<head>
  <title>구독 서비스 관리</title>
</head>


<body>
  <main layout:fragment="content">
    <div class="container py-3">
      <!-- 여백용 -->
      <h5 class="mb-3">&nbsp;</h5>

      <!-- 상단 요약 -->
      <div class="d-flex justify-content-between align-items-center mb-2 small text-muted">
        <div>
          <h5 class="mb-3">
            내 구독 관리 (<span th:text="${subsCount}">0</span>개)
          </h5>
        </div>

        <!-- 정렬 버튼 영역 (스크립트 없어도 UI용으로 유지) -->
        <div class="btn-group mb-2" role="group">
          <button type="button" class="btn btn-outline-secondary subs-sort-btn" data-sort="price" data-dir="asc">
            가격 낮은순
          </button>

          <button type="button" class="btn btn-outline-secondary subs-sort-btn" data-sort="price" data-dir="desc">
            가격 높은순
          </button>

          <button type="button" class="btn btn-outline-secondary subs-sort-btn" data-sort="" data-dir="">
            결제일
          </button>

          <button type="button" class="btn btn-outline-secondary subs-sort-btn" data-sort="created" data-dir="asc">
            등록순
          </button>
        </div>
      </div>

      <!-- 메인 카드 -->
      <div class="card">
        <div class="card-body p-0">

          <!-- 비어 있을 때 -->
          <div th:if="${#lists.isEmpty(subsList)}" class="text-muted text-center py-4">
            아직 등록된 구독이 없습니다.
          </div>

          <!-- 구독 리스트 -->
          <div th:if="${!#lists.isEmpty(subsList)}">

            <!-- (나중에 스크립트 연결할 수 있게 래퍼 유지) -->
            <div id="subs-list-wrapper">

              <div th:each="s : ${subsList}"
                class="d-flex justify-content-between align-items-center px-3 py-2 border-bottom subs-item" th:attr="data-price=${s.subsPrice},
                          data-start=${s.subsStartDate},
                          data-name=${s.subsName},
                          data-billing=${s.subsBillingDay}">

                <!-- 왼쪽: 아이콘 + (이름 + 액션버튼) + 설명 -->
                <div class="d-flex align-items-center gap-3">

                  <!-- 아이콘: 값이 있을 때 -->
                  <img th:if="${s.subsIcon != null and s.subsIcon != ''}"
                    th:src="@{/img/subs/{icon}(icon=${s.subsIcon})}" style="width:32px;height:32px;object-fit:contain;">

                  <!-- 아이콘 없을 때 기본 이미지 -->
                  <img th:if="${s.subsIcon == null or s.subsIcon == ''}" th:src="@{/img/subs/default.svg}"
                    style="width:32px;height:32px;object-fit:contain;">

                  <!-- 텍스트 영역 -->
                  <div>

                    <!-- 1줄: 이름 + 수정/삭제 아이콘 -->
                    <div class="subs-name-row">
                      <span class="fw-semibold me-1" th:text="${s.subsName}">서비스 이름</span>

                      <button type="button" class="subs-action-btn" title="수정">
                        <i class="bi bi-pencil-square"></i>
                      </button>

                      <button type="button" class="subs-action-btn" title="삭제">
                        <i class="bi bi-trash"></i>
                      </button>
                    </div>

                    <!-- 2줄: 타입 / 결제일 / 시작일 -->
                    <small class="text-muted">
                      <span th:text="${s.subsType}">타입</span>
                      · 매월 <span th:text="${s.subsBillingDay}">1</span>일
                      · 시작: <span th:text="${s.subsStartDate}">2025-12-03</span>
                    </small>
                  </div>
                </div>

                <!-- 오른쪽: 가격 + 상태 -->
                <div class="text-end">
                  <div class="fw-semibold" th:text="${#numbers.formatInteger(s.subsPrice, 0, 'COMMA')} + ' 원'">
                    15,900 원
                  </div>
                  <small th:text="${s.subsActive == 1 ? '구독중' : '해지'}"
                    th:classappend="${s.subsActive == 1} ? ' text-success' : ' text-muted'">
                    구독중
                  </small>
                </div>

              </div> <!-- /subs-item -->

            </div> <!-- /subs-list-wrapper -->
          </div> <!-- /!empty -->
        </div> <!-- /card-body -->
      </div> <!-- /card -->
    </div> <!-- /container -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const wrapper = document.getElementById("subs-list-wrapper");
        if (!wrapper) return;

        // 처음 로딩된 순서 기준으로 계속 재정렬
        const items = Array.from(wrapper.querySelectorAll(".subs-item"));
        const buttons = Array.from(document.querySelectorAll(".subs-sort-btn"));

        // ===== 쿠키 유틸 =====
        function setCookie(name, value, days) {
          const d = new Date();
          d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
          document.cookie =
            name + "=" + encodeURIComponent(value) +
            ";expires=" + d.toUTCString() + ";path=/";
        }

        function getCookie(name) {
          const value = document.cookie
            .split("; ")
            .find(row => row.startsWith(name + "="));
          return value ? decodeURIComponent(value.split("=")[1]) : null;
        }

        // ===== 정렬 함수 =====
        function applySort(sort, dir, fromInit = false) {
          const list = [...items]; // 원본 배열 복사

          if (!sort) {
            // 기본 정렬: 결제일(청구일) 오름차순, 같은 날이면 가격 오름차순
            list.sort((a, b) => {
              const billA = Number(a.dataset.billing || 0);
              const billB = Number(b.dataset.billing || 0);
              if (billA !== billB) return billA - billB;

              const priceA = Number(a.dataset.price || 0);
              const priceB = Number(b.dataset.price || 0);
              return priceA - priceB;
            });
          } else if (sort === "price") {
            list.sort((a, b) => {
              const priceA = Number(a.dataset.price || 0);
              const priceB = Number(b.dataset.price || 0);
              return priceA - priceB;
            });
            if (dir === "desc") {
              list.reverse();
            }

          } else if (sort === "created") {
            // 등록순: 처음 로딩된 순서(items 배열 순서) 기준
            list.sort((a, b) => items.indexOf(a) - items.indexOf(b));
            // dir이 desc면 뒤집고 싶으면 아래 추가
            if (dir === "desc") {
              list.reverse();
            }
          }

          // DOM 갱신
          wrapper.innerHTML = "";
          list.forEach(el => wrapper.appendChild(el));

          // 버튼 active 표시
          buttons.forEach(btn => {
            const bSort = btn.dataset.sort || "";
            const bDir = btn.dataset.dir || "";
            if ((bSort || "") === (sort || "") && (bDir || "") === (dir || "")) {
              btn.classList.add("active");
            } else {
              btn.classList.remove("active");
            }
          });

          // 초기 로딩일 땐 쿠키 저장 X (이미 쿠키 값 기준으로 돌린 거니까)
          if (!fromInit) {
            setCookie("subs_sort", sort || "", 30);
            setCookie("subs_dir", dir || "", 30);
          }
        }

        // ===== 처음 로딩 시: 쿠키 읽어서 적용 =====
        const cookieSort = getCookie("subs_sort");
        const cookieDir = getCookie("subs_dir") || "";

        // 쿠키랑 매칭되는 버튼 있으면 그걸 기준으로, 없으면 기본(결제일) 버튼
        const defaultBtn =
          buttons.find(btn =>
            (btn.dataset.sort || "") === (cookieSort || "") &&
            (btn.dataset.dir || "") === (cookieDir || "")
          ) || buttons.find(btn => !btn.dataset.sort) || buttons[0];

        const initSort = defaultBtn.dataset.sort || "";
        const initDir = defaultBtn.dataset.dir || "";

        applySort(initSort, initDir, true);

        // ===== 클릭 핸들러 =====
        buttons.forEach(btn => {
          btn.addEventListener("click", () => {
            const sort = btn.dataset.sort || "";
            const dir = btn.dataset.dir || "";
            applySort(sort, dir);
          });
        });
      });
    </script>
  </main>
</body>

</html>
