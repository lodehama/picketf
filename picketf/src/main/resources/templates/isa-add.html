<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout/layout.html}">

<head>
  <title>ISA 계좌 개설하기</title>
</head>

<main layout:fragment="content">
  <div class="container py-3">
    <h2>ISA 계좌 개설하기</h2>

    <form method="post" action="/isa/add">
      <div class="mb-3">
        <label class="form-label">개설 연도</label>
        <input type="text" name="opened_year" class="form-control" placeholder="2026" />
      </div>

      <div class="mb-3">
        <label class="form-label d-block">계좌 유형</label>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="accountType" id="typeNormal" value="NORMAL" checked />
          <label class="form-check-label" for="typeNormal">일반형</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="accountType" id="typeLowIncome" value="LOW_INCOME" />
          <label class="form-check-label" for="typeLowIncome">
            서민형 (직년연도 총급여 5000만원 이하 또는 종합소득금액 3800만원 이하인 자)
          </label>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">초기 납입금액</label>
        <input type="number" name="initialDeposit" class="form-control" placeholder="0 ~ 20,000,000" />
      </div>

      <!-- 증권사 선택 -->
      <div class="mb-3">
        <label class="form-label d-block">증권사 선택</label>

        <div class="row g-2">
          <!-- 미래에셋 -->
          <div class="col-3">
            <input type="radio" class="btn-check" name="broker" id="brokerMirae" value="MIRAE" autocomplete="off">
            <label class="border rounded-3 text-center p-3 w-100 d-block" for="brokerMirae" style="cursor:pointer;">
              미래에셋증권
              <br>평생 0.0036396% (이벤트)
              <a href="https://securities.miraeasset.com/hki/hki7000/v05.do?cs_ecis_id=202601005&strEnd=S"
                class="ms-1 text-muted" target="_blank" aria-label="수수료 링크"
                onclick="event.stopPropagation()">
                <i class="bi bi-exclamation-circle"></i>
              </a>
            </label>
          </div>

          <!-- 삼성증권 -->
          <div class="col-3">
            <input type="radio" class="btn-check" name="broker" id="brokerSamsung" value="SAMSUNG" autocomplete="off">
            <label class="border rounded-3 text-center p-3 w-100 d-block" for="brokerSamsung" style="cursor:pointer;">
              삼성증권
              <br>평생 0.0042087%
              <a href="https://www.samsungpop.com/mbw/finance/isa.do?cmd=guide"
                class="ms-1 text-muted" target="_blank" aria-label="수수료 링크"
                onclick="event.stopPropagation()">
                <i class="bi bi-exclamation-circle"></i>
              </a>
            </label>
          </div>

          <!-- 한국투자 -->
          <div class="col-3">
            <input type="radio" class="btn-check" name="broker" id="brokerKorea" value="KOREA_INVEST" autocomplete="off">
            <label class="border rounded-3 text-center p-3 w-100 d-block" for="brokerKorea" style="cursor:pointer;">
              한국투자증권
              <br>평생 0.0042087% (이벤트)
              <a href="https://www.truefriend.com/main/customer/notice/Event.jsp?gubun=i&cmd=TF04gb010002&num=6544&from=&currentPage=1&CUSTGUBUN=00&focusYN=btn_focus&userRowsPerPage=10&searchColumn=all&searchValue=isa"
                class="ms-1 text-muted" target="_blank" aria-label="수수료 링크"
                onclick="event.stopPropagation()">
                <i class="bi bi-exclamation-circle"></i>
              </a>
              <br>이벤트 기간 ~ 26.02.28
            </label>
          </div>

          <!-- KB -->
          <div class="col-3">
            <input type="radio" class="btn-check" name="broker" id="brokerKB" value="KB" autocomplete="off">
            <label class="border rounded-3 text-center p-3 w-100 d-block" for="brokerKB" style="cursor:pointer;">
              KB증권
              <br>평생 0.0050483% (이벤트)
              <a href="https://www.kbsec.com/go.able?linkcd=s060902030000&seq=10009423&idt=20260121"
                class="ms-1 text-muted" target="_blank" aria-label="수수료 링크"
                onclick="event.stopPropagation()">
                <i class="bi bi-exclamation-circle"></i>
              </a>
            </label>
          </div>

          <!-- NH -->
          <div class="col-3">
            <input type="radio" class="btn-check" name="broker" id="brokerNH" value="NH" autocomplete="off">
            <label class="border rounded-3 text-center p-3 w-100 d-block" for="brokerNH" style="cursor:pointer;">
              NH투자증권
              <br>0.01%
              <a href="https://mynamuhbegin.com/stock?tab=ko"
                class="ms-1 text-muted" target="_blank" aria-label="수수료 링크"
                onclick="event.stopPropagation()">
                <i class="bi bi-exclamation-circle"></i>
              </a>
              <br>12개월간 0.004901% (이벤트)
              <a href="https://mynamuhbegin.com/isa"
                class="ms-1 text-muted" target="_blank" aria-label="수수료 링크"
                onclick="event.stopPropagation()">
                <i class="bi bi-exclamation-circle"></i>
              </a>
              <br>이벤트 기간 ~ 26.06.30
            </label>
          </div>

          <!-- 메리츠 -->
          <div class="col-3">
            <input type="radio" class="btn-check" name="broker" id="brokerMeritz" value="MERITZ" autocomplete="off">
            <label class="border rounded-3 text-center p-3 w-100 d-block" for="brokerMeritz" style="cursor:pointer;">
              메리츠증권
              <br>0.009%
              <a href="https://home.imeritz.com/svcinfo/DealFeeTax.do"
                class="ms-1 text-muted" target="_blank" aria-label="수수료 링크"
                onclick="event.stopPropagation()">
                <i class="bi bi-exclamation-circle"></i>
              </a>
            </label>
          </div>

          <!-- 하나 -->
          <div class="col-3">
            <input type="radio" class="btn-check" name="broker" id="brokerHana" value="HANA" autocomplete="off">
            <label class="border rounded-3 text-center p-3 w-100 d-block" for="brokerHana" style="cursor:pointer;">
              하나증권
              <br><span style="color: red;">0.01416390%</span>
              <a href="https://www.hanaw.com/main/customer/cm/CS_060200_T2.jsp"
                class="ms-1 text-muted" target="_blank" aria-label="수수료 링크"
                onclick="event.stopPropagation()">
                <i class="bi bi-exclamation-circle"></i>
              </a>
              <br>3개월간 0.0042087% (이벤트)
            </label>
          </div>

          <!-- 키움 -->
          <div class="col-3">
            <input type="radio" class="btn-check" name="broker" id="brokerKiwoom" value="KIWOOM" autocomplete="off">
            <label class="border rounded-3 text-center p-3 w-100 d-block" for="brokerKiwoom" style="cursor:pointer;">
              키움증권
              <br><span style="color: red;">0.015%</span>
              <a href="https://www.kiwoom.com/h/help/fee/VHelpStockFeeView"
                class="ms-1 text-muted" target="_blank" aria-label="수수료 링크"
                onclick="event.stopPropagation()">
                <i class="bi bi-exclamation-circle"></i>
              </a>
            </label>
          </div>

          <!-- 카카오페이 -->
          <div class="col-3">
            <input type="radio" class="btn-check" name="broker" id="brokerKakao" value="KAKAO" autocomplete="off">
            <label class="border rounded-3 text-center p-3 w-100 d-block" for="brokerKakao" style="cursor:pointer;">
              카카오페이증권
              <br><span style="color: red;">0.015%</span>
              <a href="https://www.kakaopaysec.com/guide/feeGuide/dynamicPage.do"
                class="ms-1 text-muted" target="_blank" aria-label="수수료 링크"
                onclick="event.stopPropagation()">
                <i class="bi bi-exclamation-circle"></i>
              </a>
            </label>
          </div>

          <!-- 신한 -->
          <div class="col-3">
            <input type="radio" class="btn-check" name="broker" id="brokerShinhan" value="SHINHAN" autocomplete="off">
            <label class="border rounded-3 text-center p-3 w-100 d-block" for="brokerShinhan" style="cursor:pointer;">
              신한증권
              <br><span style="color: red;">0.189733%</span>
              <a href="https://www.shinhansec.com/siw/customer-center/guide/business_guide_charge_tab1/contents.do"
                class="ms-1 text-muted" target="_blank" aria-label="수수료 링크"
                onclick="event.stopPropagation()">
                <i class="bi bi-exclamation-circle"></i>
              </a>
              <br>2026년 0.0042087% (이벤트)
            </label>
          </div>

          <!-- 기타 -->
          <div class="col-3">
            <input type="radio" class="btn-check" name="broker" id="brokerOther" value="OTHER" autocomplete="off">
            <label class="border rounded-3 text-center p-3 w-100 d-block" for="brokerOther" style="cursor:pointer;">
              기타 증권사
            </label>
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary">추가</button>

      <div class="mt-3 text-muted">
        <span style="color: red;">(이벤트)는 미참여 시 기본 수수료가 적용됩니다. 적용 여부는 반드시 증권사 앱에서 확인하세요.</span>
        <br>개설 시점에는 상단에 표기된 수수료와 다를 수 있으니 상세 페이지를 통해 확인해 주세요.
        <br><i class="bi bi-exclamation-circle"></i> 버튼을 클릭하여 해당 증권사의 수수료 상세 내용을 확인할 수 있습니다.
        <br><br>상단에 표기된 수수료는 ISA 중개형 (비대면 계좌) - 모바일 거래(MTS) - 국내 ETF 기준입니다.
        <br>코스피 / 코스닥 / 해외주식 / 금현물 / 채권 수수료와는 관계가 없습니다.
      </div>
    </form>

  </div>
</main>

</html>
