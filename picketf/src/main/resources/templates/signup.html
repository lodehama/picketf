<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout/login-layout.html}">

<head>
  <title>회원가입</title>
  <meta name="_csrf" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>

<main class="login-layout-main auth-page signup-main" layout:fragment="content">
  <div class="auth-wrap">
    <div class="auth-card">

      <h1 class="auth-title">회원가입</h1>
      <p class="auth-desc">계정을 만들고 다양한 기능을 이용해보세요.</p>

      <form action="/register" method="post" class="signup-form">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <!-- 서버 에러 -->
        <div class="msg-error" th:if="${registerError}" th:text="${registerError}"></div>

        <!-- 아이디 -->
        <div class="form-group">
          <label for="username" class="form-label">아이디</label>
          <input type="text" class="form-control" id="username" name="us_id"
            th:value="${user != null ? user.us_id : ''}" minlength="4" maxlength="16" required>
          <div id="idMessage" class="input-message"></div>
        </div>

        <!-- 비밀번호 -->
        <div class="form-group">
          <label for="password" class="form-label">비밀번호</label>
          <input type="password" class="form-control" id="password" name="us_pw" minlength="8" maxlength="20" required>
          <div id="passwordMessage" class="input-message"></div>
        </div>

        <!-- 닉네임 -->
        <div class="form-group">
          <label for="us_nickname" class="form-label">닉네임</label>
          <input type="text" id="us_nickname" name="us_nickname" class="form-control"
            th:value="${user != null ? user.us_nickname : ''}" required>
          <div id="nicknameMessage" class="input-message"></div>
        </div>

        <!-- 이메일 -->
        <div class="form-group">
          <label for="email" class="form-label">이메일</label>
          <input type="email" class="form-control" id="email" name="us_email"
            th:value="${user != null ? user.us_email : ''}" maxlength="255" required>
          <div id="emailMessage" class="input-message"></div>
        </div>

        <!-- 가입 버튼 -->
        <button type="submit" id="signupBtn" class="btn-auth signup-btn">
          가입하기
        </button>

        <!-- 로그인 이동 -->
        <div class="auth-links bottom-link">
          <span>이미 계정이 있으신가요?</span>
          <a th:href="@{/login}">로그인</a>
        </div>

      </form>
    </div>
  </div>

  <script>
    const usernameInput = document.getElementById("username");
    const idMessage = document.getElementById("idMessage");

    const passwordInput = document.getElementById("password");
    const passwordMessage = document.getElementById("passwordMessage");

    const nicknameInput = document.getElementById("us_nickname");
    const nicknameMessage = document.getElementById("nicknameMessage");

    const emailInput = document.getElementById("email");
    const emailMessage = document.getElementById("emailMessage");

    const signupBtn = document.getElementById("signupBtn");

    let idTimer;
    let nicknameTimer;

    let isIdValid = false;
    let isPasswordValid = false;
    let isNicknameValid = false;
    let isEmailValid = false;

    function updateSignupButton() {
      signupBtn.disabled = !(isIdValid && isPasswordValid && isNicknameValid && isEmailValid);
    }

    function validateUserIdFormat(value) {
      const idRegex = /^[a-zA-Z][a-zA-Z0-9]{3,15}$/;

      if (!idRegex.test(value)) {
        return {
          valid: false,
          message: "아이디는 4~16자, 영문으로 시작해야 합니다."
        };
      }

      return { valid: true };
    }

    function validatePasswordFormat(value) {
      const passwordRegex = /^[A-Za-z0-9!@#$%^&*]{8,20}$/;

      if (!passwordRegex.test(value)) {
        return {
          valid: false,
          message: "비밀번호는 8~20자, 영문과 숫자, 특수문자만 가능합니다."
        };
      }

      return { valid: true };
    }

    function validateNicknameFormat(value) {
      const allowedRegex = /^[가-힣a-zA-Z0-9]+$/;

      if (!allowedRegex.test(value)) {
        return {
          valid: false,
          message: "닉네임은 2~8자, 한글/영문/숫자만 가능합니다."
        };
      }

      let koreanCount = 0;
      let englishCount = 0;
      let numberCount = 0;

      for (const ch of value) {
        if (/[가-힣]/.test(ch)) {
          koreanCount++;
        } else if (/[a-zA-Z]/.test(ch)) {
          englishCount++;
        } else if (/[0-9]/.test(ch)) {
          numberCount++;
        }
      }

      const valid = koreanCount >= 2 || englishCount >= 3 || numberCount >= 4;

      if (!valid) {
        return {
          valid: false,
          message: "닉네임은 한글 2자 이상, 영문 3자 이상, 숫자 4자 이상 중 하나를 만족해야 합니다."
        };
      }

      return { valid: true };
    }

    function validateEmailFormat(value) {
      const emailRegex = /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/;

      if (!emailRegex.test(value)) {
        return {
          valid: false,
          message: "올바른 이메일 형식이 아닙니다."
        };
      }

      return { valid: true };
    }

    usernameInput.addEventListener("input", function () {
      clearTimeout(idTimer);

      const value = usernameInput.value.trim();

      if (value === "") {
        idMessage.textContent = "";
        idMessage.className = "input-message";
        isIdValid = false;
        updateSignupButton();
        return;
      }

      const formatResult = validateUserIdFormat(value);

      if (!formatResult.valid) {
        idMessage.textContent = formatResult.message;
        idMessage.className = "input-message error";
        isIdValid = false;
        updateSignupButton();
        return;
      }

      idTimer = setTimeout(async function () {
        const response = await fetch(`/id/check?userId=${encodeURIComponent(value)}`);
        const data = await response.json();

        if (!data.valid || data.duplicated) {
          idMessage.textContent = data.message;
          idMessage.className = "input-message error";
          isIdValid = false;
        } else {
          idMessage.textContent = data.message;
          idMessage.className = "input-message success";
          isIdValid = true;
        }

        updateSignupButton();
      }, 300);
    });

    passwordInput.addEventListener("input", function () {
      const value = passwordInput.value.trim();

      if (value === "") {
        passwordMessage.textContent = "";
        passwordMessage.className = "input-message";
        isPasswordValid = false;
        updateSignupButton();
        return;
      }

      const formatResult = validatePasswordFormat(value);

      if (!formatResult.valid) {
        passwordMessage.textContent = formatResult.message;
        passwordMessage.className = "input-message error";
        isPasswordValid = false;
      } else {
        passwordMessage.textContent = "사용 가능한 비밀번호 형식입니다.";
        passwordMessage.className = "input-message success";
        isPasswordValid = true;
      }

      updateSignupButton();
    });

    nicknameInput.addEventListener("input", function () {
      clearTimeout(nicknameTimer);

      const value = nicknameInput.value.trim();

      if (value === "") {
        nicknameMessage.textContent = "";
        nicknameMessage.className = "input-message";
        isNicknameValid = false;
        updateSignupButton();
        return;
      }

      const formatResult = validateNicknameFormat(value);

      if (!formatResult.valid) {
        nicknameMessage.textContent = formatResult.message;
        nicknameMessage.className = "input-message error";
        isNicknameValid = false;
        updateSignupButton();
        return;
      }

      nicknameTimer = setTimeout(async function () {
        const response = await fetch(`/nickname/check?nickname=${encodeURIComponent(value)}`);
        const data = await response.json();

        if (!data.valid) {
          nicknameMessage.textContent = data.message;
          nicknameMessage.className = "input-message error";
          isNicknameValid = false;
        } else {
          nicknameMessage.textContent = data.message;
          nicknameMessage.className = "input-message success";
          isNicknameValid = true;
        }

        updateSignupButton();
      }, 300);
    });

    emailInput.addEventListener("input", function () {
      const value = emailInput.value.trim();

      if (value === "") {
        emailMessage.textContent = "";
        emailMessage.className = "input-message";
        isEmailValid = false;
        updateSignupButton();
        return;
      }

      const result = validateEmailFormat(value);

      if (!result.valid) {
        emailMessage.textContent = result.message;
        emailMessage.className = "input-message error";
        isEmailValid = false;
      } else {
        emailMessage.textContent = "사용 가능한 이메일 형식입니다.";
        emailMessage.className = "input-message success";
        isEmailValid = true;
      }

      updateSignupButton();
    });

    updateSignupButton();
  </script>
</main>

</html>
