<div th:fragment="header">
  <header class="app-header">
    <div class="app-header__inner">

      <!-- 좌측 -->
      <a href="/isa" class="app-logo">
        <img src="/img/favicon.svg" alt="Pick ETF" class="app-logo__icon">
        <span class="app-logo__text">Pick ETF</span>
      </a>

      <!-- 중앙 -->
      <nav class="app-nav">
        <a href="/snp" class="app-nav__link">S&P 500</a>
        <a href="/qqq" class="app-nav__link">나스닥 100</a>
        <a href="/m7" class="app-nav__link">빅테크 M10</a>
        <a href="/gld" class="app-nav__link">금</a>
      </nav>

      <!-- 우측 -->
      <div class="app-header__right">
        <a href="/login" class="app-nav__link" sec:authorize="isAnonymous()">로그인</a>
        <a href="/signup" class="app-nav__link" sec:authorize="isAnonymous()">회원가입</a>

        <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()" class="app-nav__logout">
          <button type="submit" class="app-nav__link app-nav__btn"> <i class="bi bi-box-arrow-right me-2"></i>
          </button>
        </form>
      </div>

    </div>
  </header>
</div>
