<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout/layout.html}">

<head>
  <title>구독 서비스 관리</title>
</head>

<body>
  <main layout:fragment="content">
    <div class="container py-3">

      <!-- 페이지 제목 -->
      <h5 class="mb-3">내 구독 서비스</h5>

      <!-- 정렬 드롭다운 -->
      
      <div class="dropdown">
        <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" id="subsSortDropdown"
          data-bs-toggle="dropdown" aria-expanded="false">
          <span id="subs-sort-label">정렬</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">

          <!-- 기본 정렬 -->
          <li>
            <a href="#" class="dropdown-item subs-sort-option" data-sort="" data-dir="" data-label="기본 정렬 (결제일 순)">
              기본 정렬 (결제일 순)
            </a>
          </li>

          <li>
            <hr class="dropdown-divider" />
          </li>

          <!-- 가격 낮은순 -->
          <li>
            <a href="#" class="dropdown-item subs-sort-option" data-sort="price" data-dir="asc" data-label="가격 낮은순">
              가격 낮은순
            </a>
          </li>

          <!-- 가격 높은순 -->
          <li>
            <a href="#" class="dropdown-item subs-sort-option" data-sort="price" data-dir="desc" data-label="가격 높은순">
              가격 높은순
            </a>
          </li>

        </ul>
      </div>
      <!-- 상단 요약 -->
      <div class="d-flex justify-content-between align-items-center mb-2 small text-muted">
        <div>
          Recent Subscriptions
        </div>
        <div>
          총 <span th:text="${subsCount}">0</span>개
        </div>
      </div>

      <!-- 메인 카드 -->
      <div class="card">
        <div class="card-body p-0">

          <!-- 비어 있을 때 -->
          <div th:if="${#lists.isEmpty(subsList)}" class="text-muted text-center py-4">
            아직 등록된 구독이 없습니다.
          </div>

          <!-- 구독 리스트 -->
          <div th:if="${!#lists.isEmpty(subsList)}">

            <!-- 정렬 대상 래퍼 -->
            <div id="subs-list-wrapper">

              <div th:each="s : ${subsList}"
                class="d-flex justify-content-between align-items-center px-3 py-2 border-bottom subs-item" th:attr="data-price=${s.subsPrice},
                  data-start=${s.subsStartDate},
                  data-name=${s.subsName}">
                <!-- 왼쪽: 아이콘 + 이름/설명 -->
                <div class="d-flex align-items-center gap-2">

                  <!-- 아이콘: 값이 있을 때 -->
                  <img th:if="${s.subsIcon != null and s.subsIcon != ''}"
                    th:src="@{/img/subs/{icon}(icon=${s.subsIcon})}"
                    style="width:32px;height:32px;object-fit:contain;margin-right:8px;">

                  <!-- 아이콘 없을 때 기본 이미지 -->
                  <img th:if="${s.subsIcon == null or s.subsIcon == ''}" th:src="@{/img/subs/default.svg}"
                    style="width:32px;height:32px;object-fit:contain;margin-right:8px;">

                  <div>
                    <div class="fw-semibold" th:text="${s.subsName}">서비스 이름</div>
                    <small class="text-muted">
                      <span th:text="${s.subsType}">타입</span>
                      · 매월 <span th:text="${s.subsBillingDay}">1</span>일
                      · 시작: <span th:text="${s.subsStartDate}">2025-12-03</span>
                    </small>
                  </div>
                </div>

                <!-- 오른쪽: 가격 + 상태 -->
                <div class="text-end">
                  <div class="fw-semibold" th:text="${#numbers.formatInteger(s.subsPrice, 0, 'COMMA')} + ' 원'">
                    15,900 원
                  </div>
                  <small th:text="${s.subsActive == 1 ? '구독중' : '해지'}"
                    th:classappend="${s.subsActive == 1} ? ' text-success' : ' text-muted'">
                    구독중
                  </small>
                </div>
              </div> <!-- /subs-item -->
            </div> <!-- /subs-list-wrapper -->
          </div>
        </div>
      </div>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const wrapper = document.getElementById("subs-list-wrapper");
        if (!wrapper) return;

        const itemsSelector = ".subs-item";
        const sortOptions = document.querySelectorAll(".subs-sort-option");
        const sortLabelSpan = document.getElementById("subs-sort-label");

        const COOKIE_NAME = "subsSort"; // 예: "price:asc"

        function setCookie(name, value, days) {
          const d = new Date();
          d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
          document.cookie = name + "=" + encodeURIComponent(value)
            + ";expires=" + d.toUTCString()
            + ";path=/";
        }

        function getCookie(name) {
          const target = name + "=";
          const parts = document.cookie.split("; ");
          for (const p of parts) {
            if (p.startsWith(target)) {
              return decodeURIComponent(p.substring(target.length));
            }
          }
          return null;
        }

        // 실제 정렬 함수
        function applySort(sort, dir) {
          const items = Array.from(wrapper.querySelectorAll(itemsSelector));
          if (items.length === 0) return;

          // 정렬 기준 없으면, DOM 순서 그대로 (서버 기본 정렬)
          if (!sort) {
            return;
          }

          const factor = dir === "desc" ? -1 : 1;

          items.sort((a, b) => {
            let av, bv;

            if (sort === "price") {
              av = parseInt(a.dataset.price || "0", 10);
              bv = parseInt(b.dataset.price || "0", 10);
            } else if (sort === "start") {
              // YYYY-MM-DD라서 문자열 비교해도 순서 맞음
              av = a.dataset.start || "";
              bv = b.dataset.start || "";
            } else if (sort === "name") {
              av = (a.dataset.name || "").toLowerCase();
              bv = (b.dataset.name || "").toLowerCase();
            } else {
              return 0;
            }

            if (av < bv) return -1 * factor;
            if (av > bv) return 1 * factor;
            return 0;
          });

          items.forEach(el => wrapper.appendChild(el));
        }

        // 드롭다운에서 active 표시 + 라벨 변경
        function updateUI(sort, dir) {
          sortOptions.forEach(opt => {
            opt.classList.remove("active");
            const os = opt.dataset.sort || "";
            const od = opt.dataset.dir || "";
            if (os === (sort || "") && od === (dir || "")) {
              opt.classList.add("active");
              if (sortLabelSpan && opt.dataset.label) {
                sortLabelSpan.textContent = opt.dataset.label;
              }
            }
          });

          // 아무 것도 매칭 안 되면 기본 텍스트
          if (!document.querySelector(".subs-sort-option.active") && sortLabelSpan) {
            sortLabelSpan.textContent = "정렬";
          }
        }

        // 클릭 이벤트: URL 안 바꾸고, 쿠키 저장 + 정렬
        sortOptions.forEach(opt => {
          opt.addEventListener("click", (e) => {
            e.preventDefault();

            const sort = opt.dataset.sort || "";
            const dir = opt.dataset.dir || "";
            const label = opt.dataset.label || "정렬";

            // 쿠키에 저장 (예: "price:asc")
            setCookie(COOKIE_NAME, `${sort}:${dir}`, 30);

            // 정렬 적용
            applySort(sort, dir);

            // 라벨/active 업데이트
            if (sortLabelSpan) {
              sortLabelSpan.textContent = label;
            }
            updateUI(sort, dir);
          });
        });

        // 페이지 처음 로드될 때, 쿠키 값 있으면 그대로 적용
        const saved = getCookie(COOKIE_NAME);  // 예: "price:asc"
        if (saved) {
          const [savedSort, savedDir] = saved.split(":");
          applySort(savedSort, savedDir);
          updateUI(savedSort, savedDir);
        }
      });
    </script>
  </main>
</body>
</html>
