<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="icon" href="/img/favicon.svg" type="image/svg+xml">

  <!-- 페이지 폰트 일괄 수정 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- 페이지 제목을 "기능명 | Pick ETF" 형식으로 통일 -->
  <title layout:title-pattern="$CONTENT_TITLE | Pick ETF">

</head>

<body>
  <div class="app-wrapper d-flex">

    <aside class="app-sidebar">

      <!-- 위쪽: 일반 메뉴 (스크롤 영역) -->
      <nav class="sidebar-nav">

        <div class="sidebar-section-title">OVERVIEW</div>

        <a th:href="@{/isa}" class="sidebar-link">
          <i class="bi bi-house-door me-2"></i> ISA 계좌 관리
        </a>

        <a th:href="@{/isa/tax}" class="sidebar-link">
          <i class="bi bi-wallet2 me-2"></i> ISA 절세 계산기
        </a>

        <div class="sidebar-section-title">FINANCE</div>

        <a th:href="@{/subs}" class="sidebar-link">
          <i class="bi bi-bar-chart-line me-2"></i> 구독 관리
        </a>

        <a th:href="@{/cpi}" class="sidebar-link">
          <i class="bi bi-wallet2 me-2"></i> 화폐가치 계산기
        </a>

        <div class="sidebar-section-title">ETC</div>
        <a th:href="@{/portfolio}" class="sidebar-link">
          <i class="bi bi-wallet2 me-2"></i> 자료 출처
        </a>
        <a th:href="@{/fees}" class="sidebar-link">
          <i class="bi bi-wallet2 me-2"></i> 증권사 수수료 비교
        </a>
        <a th:href="@{/devlog}" class="sidebar-link">
          <i class="bi bi-wallet2 me-2"></i> Dev Log
        </a>

      </nav>

      <!-- 아래: 고정 영역 (Settings / Help) -->
      <div class="sidebar-footer">
        <a th:href="@{/settings}" class="sidebar-link">
          <i class="bi bi-gear me-2"></i> Settings
        </a>
        <a th:href="@{/help}" class="sidebar-link">
          <i class="bi bi-question-circle me-2"></i> Help
        </a>
      </div>

    </aside>

    <!-- 우측 메인영역 -->
    <div class="app-main flex-grow-1 d-flex flex-column">

      <!-- 헤더 -->
      <div th:replace="~{fragments/layout/header.html :: header}"></div>

      <!-- 본문 콘텐츠 -->
      <main layout:fragment="content"></main>

      <!-- 푸터 -->
      <div th:replace="~{fragments/layout/footer.html :: footer}"></div>

      <!-- 공통 Chart.js -->
      <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
      <!-- <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script> -->


      <!-- 개별 페이지 스크립트 삽입 위치 -->
      <th:block layout:fragment="script"></th:block>

    </div>
</body>

</html>
