<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout/layout.html}">

<head>
  <title>구독 서비스 관리</title>
</head>

<body>
  <main layout:fragment="content">
    <div class="container py-3">
      <div class="container-fluid py-3" style="max-width:760px; margin-left:0;">

        <!-- 여백용 -->
        <h5 class="mb-3">&nbsp;</h5>

        <!-- 상단 요약 -->
        <div class="d-flex justify-content-between align-items-center mb-2 small text-muted">
          <div>
            <h5 class="mb-3">
              내 구독 관리 (<span th:text="${subsCount}">0</span>개)
            </h5>
          </div>

          <!-- 정렬 버튼 -->
          <div class="btn-group mb-2" role="group">
            <button type="button" class="btn btn-outline-secondary subs-sort-btn" data-sort="price" data-dir="asc">
              가격 낮은순
            </button>
            <button type="button" class="btn btn-outline-secondary subs-sort-btn" data-sort="price" data-dir="desc">
              가격 높은순
            </button>
            <button type="button" class="btn btn-outline-secondary subs-sort-btn" data-sort="" data-dir="">
              결제일
            </button>
            <button type="button" class="btn btn-outline-secondary subs-sort-btn" data-sort="created" data-dir="asc">
              등록일
            </button>
          </div>
        </div>

        <!-- 메인 카드 -->
        <div class="card">
          <div class="card-body p-0">

            <!-- 비어 있을 때 -->
            <div th:if="${#lists.isEmpty(subsList)}" class="text-muted text-center py-4">
              아직 등록된 구독이 없습니다.
            </div>

            <!-- 구독 리스트 -->
            <div th:if="${!#lists.isEmpty(subsList)}">

              <div id="subs-list-wrapper">
                <div th:each="s : ${subsList}"
                  class="d-flex justify-content-between align-items-center px-3 py-2 border-bottom subs-item" th:attr="data-subs-num=${s.subsNum},
                           data-name=${s.subsName},
                           data-type=${s.subsType},
                           data-price=${s.subsPrice},
                           data-billing=${s.subsBillingDay},
                           data-start=${s.subsStartDate}">

                  <!-- 왼쪽 -->
                  <div class="d-flex align-items-center gap-3">

                    <img th:if="${s.subsIcon != null and s.subsIcon != ''}"
                      th:src="@{/img/subs/{icon}(icon=${s.subsIcon})}"
                      style="width:32px;height:32px;object-fit:contain;">

                    <img th:if="${s.subsIcon == null or s.subsIcon == ''}" th:src="@{/img/subs/default.svg}"
                      style="width:32px;height:32px;object-fit:contain;">

                    <div>
                      <div class="subs-name-row">
                        <span class="fw-semibold me-1" th:text="${s.subsName}">서비스 이름</span>

                        <!-- ON/OFF 스위치 -->
                        <div class="form-check form-switch d-inline-block align-middle ms-2">
                          <input class="form-check-input subs-active-switch" type="checkbox"
                            th:id="'subsSwitch-' + ${s.subsNum}" th:checked="${s.subsActive == 1}"
                            th:data-subs-num="${s.subsNum}">
                          <label class="form-check-label" th:for="'subsSwitch-' + ${s.subsNum}"></label>
                        </div>

                        <button type="button" class="subs-action-btn subs-edit-btn" title="수정">
                          <i class="bi bi-pencil-square"></i>
                        </button>

                        <button type="button" class="subs-action-btn subs-delete-btn" title="삭제">
                          <i class="bi bi-trash"></i>
                        </button>
                      </div>

                      <small class="text-muted">
                        <span th:text="${s.subsType}">타입</span>
                        · 등록일 : <span th:text="${s.subsStartDate}">2025-12-03</span>
                      </small>
                    </div>
                  </div>

                  <!-- 오른쪽 -->
                  <div class="text-end">
                    <div class="fw-semibold" th:text="${#numbers.formatInteger(s.subsPrice, 0, 'COMMA')} + ' 원'">
                      15,900 원
                    </div>
                    <small class="text-muted">
                      매월 <span th:text="${s.subsBillingDay}">1</span>일
                      · <span class="subs-status" th:text="${s.subsActive == 1 ? '구독중' : '해지'}"
                        th:classappend="${s.subsActive == 1} ? ' text-success' : ' text-danger'">
                        구독중
                      </span>
                    </small>
                  </div>

                </div>
              </div>

            </div>
          </div>
        </div>

        <!-- 구독 추가 버튼 -->
        <br>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-dark btn-sm flex-fill" type="button">
            직접 추가
          </button>
          <button class="btn btn-dark btn-sm flex-fill" type="button" data-bs-toggle="modal"
            data-bs-target="#subsRecommendModal">
            추천 구독 추가
          </button>
        </div>

      </div>
    </div>

    <!-- =========================================================
         추천 구독 추가 모달 (모달1)
         ========================================================= -->
    <div class="modal fade" id="subsRecommendModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">

          <div class="modal-header">
            <h5 class="modal-title">추천 구독 추가</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <div class="table-responsive">
              <table class="table table-sm align-middle">
                <thead>
                  <tr>
                    <th>선택</th>
                    <th>항목명</th>
                    <th>타입</th>
                    <th>금액</th>
                    <th>결제일</th>
                  </tr>
                </thead>
                <tbody>
                  <tr data-name="통신비" data-type="생활" data-icon="Phone.svg">
                    <td><input type="checkbox" class="rec-check"></td>
                    <td>
                      <img src="/img/subs/Phone.svg" alt="Phone" style="width:18px; height:18px; margin-right:2px;">
                      통신비
                    </td>
                    <td>생활</td>
                    <td><input type="number" class="form-control form-control-sm rec-price" value="75000"></td>
                    <td><input type="number" class="form-control form-control-sm rec-bill" min="1" max="31"></td>
                  </tr>

                  <tr data-name="유튜브 프리미엄" data-type="콘텐츠" data-icon="YouTube.svg">
                    <td><input type="checkbox" class="rec-check"></td>
                    <td>
                      <img src="/img/subs/YouTube.svg" alt="YouTube" style="width:18px; height:18px; margin-right:2px;">
                      유튜브 프리미엄
                    </td>
                    <td>콘텐츠</td>
                    <td><input type="number" class="form-control form-control-sm rec-price" value="11800"></td>
                    <td><input type="number" class="form-control form-control-sm rec-bill" min="1" max="31"></td>
                  </tr>

                  <tr data-name="넷플릭스" data-type="콘텐츠" data-icon="Netflix.svg">
                    <td><input type="checkbox" class="rec-check"></td>
                    <td>
                      <img src="/img/subs/Netflix.svg" alt="Netflix" style="width:18px; height:18px; margin-right:2px;">
                      넷플릭스
                    </td>
                    <td>콘텐츠</td>
                    <td><input type="number" class="form-control form-control-sm rec-price" value="15900"></td>
                    <td><input type="number" class="form-control form-control-sm rec-bill" min="1" max="31"></td>
                  </tr>

                  <tr data-name="스포티파이" data-type="콘텐츠" data-icon="Spotify.svg">
                    <td><input type="checkbox" class="rec-check"></td>
                    <td>
                      <img src="/img/subs/Spotify.svg" alt="Spotify" style="width:18px; height:18px; margin-right:2px;">
                      스포티파이
                    </td>
                    <td>콘텐츠</td>
                    <td><input type="number" class="form-control form-control-sm rec-price" value="15900"></td>
                    <td><input type="number" class="form-control form-control-sm rec-bill" min="1" max="31"></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <div class="modal-footer">
            <button id="btn-rec-save" type="button" class="btn btn-dark">추가하기</button>
          </div>

        </div>
      </div>
    </div>

    <!-- =========================================================
         구독 수정 모달 (모달2) - 추천모달 밖(중요)
         ========================================================= -->
    <div class="modal fade" id="subsEditModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

          <form th:action="@{/subs/edit}" method="post">
            <div class="modal-header">
              <h5 class="modal-title">구독 정보 수정</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
              <input type="hidden" name="subsNum" id="edit-subs-num">

              <div class="table-responsive">
                <table class="table table-sm align-middle mb-0 subs-edit-table">
                  <tbody>
                    <tr>
                      <th scope="row" class="subs-edit-label">이름</th>
                      <td>
                        <input type="text" class="form-control form-control-sm" name="subsName" id="edit-subs-name"
                          required>
                      </td>
                    </tr>
                    <tr>
                      <th scope="row" class="subs-edit-label">타입</th>
                      <td>
                        <input type="text" class="form-control form-control-sm" name="subsType" id="edit-subs-type"
                          placeholder="콘텐츠 / 생활 등" required>
                      </td>
                    </tr>
                    <tr>
                      <th scope="row" class="subs-edit-label">금액</th>
                      <td>
                        <div class="input-group input-group-sm">
                          <input type="number" class="form-control" name="subsPrice" id="edit-subs-price" min="0"
                            required>
                          <span class="input-group-text">원</span>
                        </div>
                      </td>
                    </tr>
                    <tr>
                      <th scope="row" class="subs-edit-label">결제일</th>
                      <td>
                        <div class="input-group input-group-sm">
                          <input type="number" class="form-control" name="subsBillingDay" id="edit-subs-billing" min="1"
                            max="31" required>
                          <span class="input-group-text">일</span>
                        </div>
                      </td>
                    </tr>
                    <tr>
                      <th scope="row" class="subs-edit-label">등록일</th>
                      <td>
                        <input type="date" class="form-control form-control-sm" name="subsStartDate"
                          id="edit-subs-start" required>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>

            <div class="modal-footer">
              <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">취소</button>
              <button type="submit" class="btn btn-dark btn-sm">저장</button>
            </div>
          </form>

          <!-- 삭제용 폼 -->
          <form th:action="@{/subs/delete}" method="post" id="subs-delete-form" style="display:none;">
            <input type="hidden" name="subsNum" id="delete-subs-num">
          </form>

        </div>
      </div>
    </div>

    <!-- =========================================================
         스크립트 (모든 모달/DOM 아래)
         ========================================================= -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {

        /* =========================================================
         * 1) 정렬/쿠키
         * ========================================================= */
        const wrapper = document.getElementById("subs-list-wrapper");
        if (wrapper) {
          const items = Array.from(wrapper.querySelectorAll(".subs-item"));
          const buttons = Array.from(document.querySelectorAll(".subs-sort-btn"));

          function setCookie(name, value, days) {
            const d = new Date();
            d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie =
              name + "=" + encodeURIComponent(value) +
              ";expires=" + d.toUTCString() + ";path=/";
          }

          function getCookie(name) {
            const value = document.cookie
              .split("; ")
              .find(row => row.startsWith(name + "="));
            return value ? decodeURIComponent(value.split("=")[1]) : null;
          }

          function applySort(sort, dir, fromInit = false) {
            const list = [...items];

            if (!sort) {
              list.sort((a, b) => {
                const billA = Number(a.dataset.billing || 0);
                const billB = Number(b.dataset.billing || 0);
                if (billA !== billB) return billA - billB;

                const priceA = Number(a.dataset.price || 0);
                const priceB = Number(b.dataset.price || 0);
                return priceA - priceB;
              });
            } else if (sort === "price") {
              list.sort((a, b) => Number(a.dataset.price || 0) - Number(b.dataset.price || 0));
              if (dir === "desc") list.reverse();
            } else if (sort === "created") {
              // 등록순 = subs_start_date 기준
              // 같은 날짜면 subs_num으로 2차 정렬(안정성)
              list.sort((a, b) => {
                const da = Date.parse(a.dataset.start || "1970-01-01") || 0;
                const db = Date.parse(b.dataset.start || "1970-01-01") || 0;
                if (da !== db) return da - db;

                const na = Number(a.dataset.subsNum || 0);
                const nb = Number(b.dataset.subsNum || 0);
                return na - nb;
              });

              if (dir === "desc") list.reverse(); // 최신 -> 오래된
            }


            wrapper.innerHTML = "";
            list.forEach(el => wrapper.appendChild(el));

            buttons.forEach(btn => {
              const bSort = btn.dataset.sort || "";
              const bDir = btn.dataset.dir || "";

              const sortMatch = (bSort === (sort || ""));
              const dirMatch = (bSort === "created") ? true : (bDir === (dir || ""));
              btn.classList.toggle("active", sortMatch && dirMatch);
            });

            if (!fromInit) {
              setCookie("subs_sort", sort || "", 30);
              setCookie("subs_dir", dir || "", 30);
            }
          }

          const cookieSort = getCookie("subs_sort") || "";
          const cookieDir = getCookie("subs_dir") || "";

          const sortBtn = buttons.find(btn => (btn.dataset.sort || "") === cookieSort);
          const initSort = sortBtn ? cookieSort : "";
          const initDir = sortBtn ? cookieDir : "";

          applySort(initSort, initDir, true);

          buttons.forEach(btn => {
            btn.addEventListener("click", () => {
              let sort = btn.dataset.sort || "";
              let dir = btn.dataset.dir || "";

              if (sort === "created") {
                dir = btn.classList.contains("active") && dir === "desc" ? "asc" : "desc";
                btn.dataset.dir = dir;
              }
              applySort(sort, dir);
            });
          });
        }

        /* =========================================================
         * 2) 추천 구독 추가 (결제일 오늘 자동 세팅 + 저장)
         *    -> 모달 "열릴 때마다" 자동 세팅되게 수정 (핵심!)
         * ========================================================= */
        const saveBtn = document.getElementById("btn-rec-save");
        const recommendModalEl = document.getElementById("subsRecommendModal");

        if (saveBtn && recommendModalEl) {

          // 모달이 열릴 때마다 결제일 기본값 주입 (이게 제일 안정적)
          recommendModalEl.addEventListener("shown.bs.modal", () => {
            const todayDay = new Date().getDate();
            recommendModalEl.querySelectorAll(".rec-bill").forEach(input => {
              if (!input.value) input.value = todayDay;
            });
          });

          saveBtn.addEventListener("click", async () => {
            const rows = Array.from(recommendModalEl.querySelectorAll("tbody tr"));
            const payload = [];

            for (const row of rows) {
              const checkbox = row.querySelector(".rec-check");
              if (!checkbox || !checkbox.checked) continue;

              const priceInput = row.querySelector(".rec-price");
              const billInput = row.querySelector(".rec-bill");

              const price = parseInt(priceInput?.value || "0", 10);
              const billingDay = parseInt(billInput?.value || "0", 10);

              if (isNaN(billingDay) || billingDay < 1 || billingDay > 31) {
                alert("결제일은 1~31 사이 숫자만 입력할 수 있습니다.");
                billInput?.focus();
                return;
              }

              payload.push({
                name: row.dataset.name,
                type: row.dataset.type,
                icon: row.dataset.icon,
                price,
                billingDay
              });
            }

            if (payload.length === 0) {
              alert("선택된 항목이 없습니다.");
              return;
            }

            try {
              const res = await fetch("/subs/recommended", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "X-Requested-With": "XMLHttpRequest"
                },
                body: JSON.stringify(payload)
              });

              if (res.ok) {
                location.reload();
              } else {
                const txt = await res.text().catch(() => "");
                alert("저장 실패 (서버 응답 오류)\n" + txt);
              }
            } catch (e) {
              alert("저장 요청 중 네트워크 오류가 발생했습니다.");
            }
          });
        }

        /* =========================================================
         * 3) 활성/비활성 스위치
         * ========================================================= */
        document.querySelectorAll(".subs-active-switch").forEach(sw => {
          sw.addEventListener("change", (e) => {
            const checkbox = e.target;
            const subsNum = checkbox.dataset.subsNum;
            const active = checkbox.checked ? 1 : 0;

            fetch(`/subs/${subsNum}/active`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "X-Requested-With": "XMLHttpRequest"
              },
              body: JSON.stringify({ active })
            })
              .then(res => {
                if (!res.ok) throw new Error("http error");
                return res.json();
              })
              .then(data => {
                if (!data.success) throw new Error("biz error");

                const item = checkbox.closest(".subs-item");
                const statusSpan = item?.querySelector(".subs-status");
                if (!statusSpan) return;

                if (active === 1) {
                  statusSpan.textContent = "구독중";
                  statusSpan.classList.remove("text-danger");
                  statusSpan.classList.add("text-success");
                } else {
                  statusSpan.textContent = "해지";
                  statusSpan.classList.remove("text-success");
                  statusSpan.classList.add("text-danger");
                }
              })
              .catch(() => {
                checkbox.checked = !checkbox.checked;
                alert("구독 상태 변경에 실패했습니다. 다시 시도해 주세요.");
              });
          });
        });

        /* =========================================================
         * 4) 수정 모달
         * ========================================================= */
        const editModalEl = document.getElementById("subsEditModal");
        const editModal = editModalEl ? new bootstrap.Modal(editModalEl) : null;

        if (editModal) {
          const nameInput = document.getElementById("edit-subs-name");
          const typeInput = document.getElementById("edit-subs-type");
          const priceInput = document.getElementById("edit-subs-price");
          const billingInput = document.getElementById("edit-subs-billing");
          const startInput = document.getElementById("edit-subs-start");
          const numInput = document.getElementById("edit-subs-num");

          document.querySelectorAll(".subs-edit-btn").forEach(btn => {
            btn.addEventListener("click", () => {
              const item = btn.closest(".subs-item");
              if (!item) return;

              numInput.value = item.dataset.subsNum || "";
              nameInput.value = item.dataset.name || "";
              typeInput.value = item.dataset.type || "";
              priceInput.value = item.dataset.price || "";
              billingInput.value = item.dataset.billing || "";
              startInput.value = item.dataset.start || "";

              editModal.show();
            });
          });
        }

        /* =========================================================
         * 5) 삭제
         * ========================================================= */
        const deleteForm = document.getElementById("subs-delete-form");
        const deleteInput = document.getElementById("delete-subs-num");

        document.querySelectorAll(".subs-delete-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            const item = btn.closest(".subs-item");
            if (!item) return;

            const subsNum = item.dataset.subsNum;
            const name = item.dataset.name || "";

            const ok = confirm(`'${name}' 정말 삭제하시겠습니까?`);
            if (!ok) return;

            deleteInput.value = subsNum;
            deleteForm.submit();
          });
        });

      });
    </script>

  </main>
</body>

</html>
