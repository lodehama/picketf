<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout/layout.html}">

<head>
  <title>메인 페이지</title>
</head>
<main class="app-content" layout:fragment="content">

  <div class="col-lg-5">
    <div class="card shadow-sm border-0 h-100">
      <div class="card-body d-flex flex-column">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="card-title mb-0">월간 구독 관리</h5>
          <small class="text-muted">This Month</small>
        </div>

        <div class="text-muted small mb-2">Recent Activity (23 transactions)</div>

        <div class="flex-grow-1">
          <div class="d-flex justify-content-between py-1 border-bottom">
            <div>
              <div>Apple Store Purchase</div>
              <small class="text-muted">Today, 2:45 PM</small>
            </div>
            <div class="text-danger fw-semibold">- $999.00</div>
          </div>
          <div class="d-flex justify-content-between py-1 border-bottom">
            <div>
              <div>Salary Deposit</div>
              <small class="text-muted">Today, 9:00 AM</small>
            </div>
            <div class="text-success fw-semibold">+ $4,500.00</div>
          </div>
          <div class="d-flex justify-content-between py-1 border-bottom">
            <div>
              <div>Netflix Subscription</div>
              <small class="text-muted">Yesterday</small>
            </div>
            <div class="text-danger fw-semibold">- $15.99</div>
          </div>
        </div>

        <div class="d-flex gap-2">
          <button class="btn btn-dark btn-sm flex-fill">직접 추가</button>
          <button class="btn btn-outline-dark btn-sm flex-fill" data-bs-toggle="modal"
            data-bs-target="#subsRecommendModal">
            추천 구독 추가
          </button>

        </div>

        <!-- 모달 -->
        <div class="modal fade" id="subsRecommendModal" tabindex="-1">
          <div class="modal-dialog modal-lg">
            <div class="modal-content">

              <div class="modal-header">
                <h5 class="modal-title">추천 구독 추가</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
              </div>

              <div class="modal-body">
                <!-- 추천항목 리스트 테이블 넣기 -->
                <div class="table-responsive">
                  <table class="table table-sm align-middle">
                    <thead>
                      <tr>
                        <th>선택</th>
                        <th>항목명</th>
                        <th>타입</th>
                        <th>금액</th>
                        <th>결제일</th>
                      </tr>
                    </thead>

                    <tbody>
                      <!-- 예시 1: 통신비 -->
                      <tr data-name="통신비" data-type="생활">
                        <td><input type="checkbox" class="rec-check"></td>
                        <td>통신비</td>
                        <td>생활</td>
                        <td><input type="number" class="form-control form-control-sm rec-price" value="75000"></td>
                        <td><input type="number" class="form-control form-control-sm rec-bill" min="1" max="31"
                            value="15"></td>
                      </tr>

                      <!-- 예시 2: 유튜브 -->
                      <tr data-name="유튜브 프리미엄" data-type="콘텐츠">
                        <td><input type="checkbox" class="rec-check"></td>
                        <td>유튜브 프리미엄</td>
                        <td>콘텐츠</td>
                        <td><input type="number" class="form-control form-control-sm rec-price" value="11800"></td>
                        <td><input type="number" class="form-control form-control-sm rec-bill" min="1" max="31"
                            value="20"></td>
                      </tr>

                      <!-- 예시 3: 넷플릭스 -->
                      <tr data-name="넷플릭스" data-type="콘텐츠">
                        <td><input type="checkbox" class="rec-check"></td>
                        <td>넷플릭스</td>
                        <td>콘텐츠</td>
                        <td><input type="number" class="form-control form-control-sm rec-price" value="15900"></td>
                        <td><input type="number" class="form-control form-control-sm rec-bill" min="1" max="31"
                            value="25"></td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>

              <div class="modal-footer">
                <button id="btn-rec-save" class="btn btn-dark">추가하기</button>
              </div>

            </div>
          </div>
        </div>

        <script>
          document.addEventListener("DOMContentLoaded", () => {

            const saveBtn = document.getElementById("btn-rec-save");

            saveBtn.addEventListener("click", async () => {

              const rows = Array.from(document.querySelectorAll("#subsRecommendModal tbody tr"));
              const payload = [];

              rows.forEach(row => {
                const checkbox = row.querySelector(".rec-check");
                if (!checkbox.checked) return;

                const name = row.dataset.name;
                const type = row.dataset.type;
                const price = parseInt(row.querySelector(".rec-price").value);
                const billingDay = parseInt(row.querySelector(".rec-bill").value);

                payload.push({ name, type, price, billingDay });
              });

              if (payload.length === 0) {
                alert("선택된 항목이 없습니다.");
                return;
              }

              const res = await fetch("/subs/recommended", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
              });

              if (res.ok) {
                location.reload();
              } else {
                alert("저장 중 문제가 발생했습니다.");
              }
            });

          });
        </script>
</main>

</html>
