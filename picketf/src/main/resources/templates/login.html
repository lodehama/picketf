<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout/layout.html}">

<head>
  <title>Pick ETF</title>
  <meta name="_csrf" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>

<main class="app-content" layout:fragment="content">
  <div class="login-wrap">
    <div class="login-card">
      <h1 class="login-title">로그인</h1>

      <div th:if="${param.error}" class="msg-error">
        아이디 또는 비밀번호가 올바르지 않습니다.
      </div>

      <div th:if="${param.logout}" class="msg-logout">
        로그아웃되었습니다.
      </div>

      <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-group">
          <label for="username" class="form-label">아이디</label>
          <input type="text" id="username" name="username" class="form-control" placeholder="아이디를 입력하세요">
        </div>

        <div class="form-group">
          <label for="password" class="form-label">비밀번호</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="비밀번호를 입력하세요">
        </div>

        <div class="login-options">
          <label>
            <input type="checkbox" name="remember-me"> 로그인 상태 유지
          </label>
        </div>

        <button type="submit" class="btn-login">로그인</button>
      </form>
    </div>
  </div>
</main>

</html>
