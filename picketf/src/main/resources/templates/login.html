<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout/login-layout.html}">

<head>
  <title>로그인</title>
  <meta name="_csrf" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>

<main class="login-layout-main auth-page login-main" layout:fragment="content">
  <div class="auth-wrap">
    <div class="auth-card">
      <h1 class="auth-title">
        <span class="auth-logo">Pick ETF</span>&nbsp;&nbsp;지수 투자자를 위한 절세 도구
      </h1>
      <!-- <p class="auth-desc">지수 투자자를 위한 절세 도구</p> -->
      <br>

      <div th:if="${param.error}" class="msg-error">
        아이디 또는 비밀번호가 올바르지 않습니다.
      </div>

      <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-group">
          <label for="username" class="form-label">아이디</label>
          <input type="text" id="username" name="username" class="form-control">
        </div>

        <div class="form-group">
          <label for="password" class="form-label">비밀번호</label>
          <input type="password" id="password" name="password" class="form-control">
        </div>

        <div class="keep-login-wrap">
          <input type="checkbox" id="remember-me" name="remember-me">
          <label for="remember-me">로그인 유지</label>
        </div>

        <div style="height:20px;"></div>
        <!-- <div class="auth-links top-link">
          <a th:href="@{/find-id}">아이디 찾기</a>
          <span class="divider">|</span>
          <a th:href="@{/reset-password}">비밀번호 재설정</a>
        </div> -->

        <button type="submit" class="btn-auth">로그인</button>

        <div class="auth-links bottom-link">
          <span>계정이 없으신가요?</span>
          <a th:href="@{/signup}">회원가입</a>
        </div>
      </form>
    </div>
  </div>
</main>

</html>
