<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{fragments/layout/layout.html}">

<head>
  <title>메인 페이지</title>
</head>
<main layout:fragment="content">
  <div class="container py-3">
    <h5 class="mb-3">KRX ETF 조회</h5>
    <div class="mb-2">
      <strong>기준일자: 추후에 DB에서 가져오기</strong>

      <table class="table etf">
        <thead>
          <tr>
            <th></th>
            <th></th>
            <th>기준일</th>
            <th>종목명</th>
            <th>실부담비용 <i class="bi bi-caret-down-fill"></i></th>
            <th>종가</th>
            <th>등락률(%)</th>
            <th>순자산가치(NAV)</th>
            <th>거래량</th>
            <th>거래대금</th>
            <th>시가총액</th>
            <th>기초지수 등락률(%)</th>
            <th>괴리율</th>
          </tr>
        </thead>
        <tbody>
          <tr data-code="379800">
            <td><i class="bi bi-bookmark"></i></td>
            <td></td>
            <td class="BAS_DD">-</td>
            <td class="ISU_NM">-</td>
            <td>0.021%</td>
            <td class="TDD_CLSPRC">-</td>
            <td class="FLUC_RT">-</td>
            <td class="NAV">-</td>
            <td class="ACC_TRDVOL">-</td>
            <td class="ACC_TRDVAL">-</td>
            <td class="MKTCAP">-</td>
            <td class="FLUC_RT_IDX">-</td>
            <td class="premium">-</td>
          </tr>

          <tr data-code="360750">
            <td><i class="bi bi-bookmark"></i></td>
            <td></td>
            <td class="BAS_DD">-</td>
            <td class="ISU_NM">-</td>
            <td>0.011%</td>
            <td class="TDD_CLSPRC">-</td>
            <td class="FLUC_RT">-</td>
            <td class="NAV">-</td>
            <td class="ACC_TRDVOL">-</td>
            <td class="ACC_TRDVAL">-</td>
            <td class="MKTCAP">-</td>
            <td class="FLUC_RT_IDX">-</td>
            <td class="premium">-</td>
          </tr>

          <tr data-code="360200">
            <td><i class="bi bi-bookmark"></i></td>
            <td></td>
            <td class="BAS_DD">-</td>
            <td class="ISU_NM">-</td>
            <td>0.011%</td>
            <td class="TDD_CLSPRC">-</td>
            <td class="FLUC_RT">-</td>
            <td class="NAV">-</td>
            <td class="ACC_TRDVOL">-</td>
            <td class="ACC_TRDVAL">-</td>
            <td class="MKTCAP">-</td>
            <td class="FLUC_RT_IDX">-</td>
            <td class="premium">-</td>
          </tr>
        </tbody>
      </table>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        const rows = Array.from(document.querySelectorAll("tr[data-code]"));
        const codes = rows.map((r) => r.dataset.code).join(",");
        const res = await fetch(`/api/krx?codes=${codes}`);
        const allData = await res.json();

        const dtoKeys = [
          "BAS_DD", "ISU_CD", "ISU_NM", "TDD_CLSPRC", "CMPPREVDD_PRC", "FLUC_RT", "NAV",
          "TDD_OPNPRC", "TDD_HGPRC", "TDD_LWPRC", "ACC_TRDVOL", "ACC_TRDVAL", "MKTCAP",
          "INVSTASST_NETASST_TOTAMT", "LIST_SHRS", "IDX_IND_NM", "OBJ_STKPRC_IDX", "CMPPREVDD_IDX", "FLUC_RT_IDX",
        ];

        const toNum = (v) => {
          if (v === null || v === undefined) return NaN;
          const s = String(v).replace(/,/g, "").trim();
          const n = Number(s);
          return isNaN(n) ? NaN : n;
        };

        // ===== 북마크 쿠키 유틸 =====
        const COOKIE_KEY = "etfBookmarks";

        const getBookmarks = () => {
          const raw = document.cookie.split("; ").find(s => s.startsWith(COOKIE_KEY + "="));
          if (!raw) return [];
          try { return JSON.parse(decodeURIComponent(raw.split("=")[1])) || []; }
          catch { return []; }
        };

        const setBookmarks = (list) => {
          const uniq = Array.from(new Set(list));
          const val = encodeURIComponent(JSON.stringify(uniq));
          const maxAge = 60 * 60 * 24 * 365 * 5; // 5년
          document.cookie = `${COOKIE_KEY}=${val}; Max-Age=${maxAge}; Path=/; SameSite=Lax`;
        };

        // ===== 데이터 채우기 =====
        const formatKoreanWon = (num) => {
          const n = Number(String(num).replace(/,/g, "").trim());
          if (isNaN(n)) return "-";
          const trillion = 1_0000_0000_0000; // 1조
          const billion = 1_0000_0000;      // 1억
          if (n >= trillion) {
            const 조 = Math.floor(n / trillion);
            const 억 = Math.floor((n % trillion) / billion);
            return `${조}조${억 > 0 ? " " + 억.toLocaleString() + "억원" : "원"}`;
          } else if (n >= billion) {
            return `${Math.floor(n / billion).toLocaleString()}억원`;
          } else if (n >= 10_000) {
            return `${Math.floor(n / 10_000).toLocaleString()}만원`;
          } else {
            return `${n.toLocaleString()}원`;
          }
        };

        const updateRowNumbers = () => {
          const tbody = document.querySelector("tbody");
          Array.from(tbody.querySelectorAll("tr")).forEach((row, i) => {
            const rankCell = row.querySelector("td:nth-child(2)");
            if (rankCell) rankCell.textContent = i + 1;
          });
        };

        rows.forEach((row) => {
          const code = row.dataset.code;
          const data = allData[code] || {};
          dtoKeys.forEach((k) => {
            const el = row.querySelector(`.${k}`);
            if (!el) return;
            if (k === "MKTCAP" && data[k]) {
              el.textContent = formatKoreanWon(data[k]);
              el.dataset.raw = String(data[k]).replace(/,/g, "");
            } else {
              el.textContent = data[k] ?? "-";
              if (k === "MKTCAP") el.dataset.raw = "0";
            }
          });

          // 괴리율 계산
          const elPrem = row.querySelector(".premium");
          if (elPrem) {
            const nav = toNum(data["NAV"]);
            const close = toNum(data["TDD_CLSPRC"]);
            elPrem.textContent =
              !isNaN(nav) && nav !== 0 && !isNaN(close)
                ? (((close - nav) / nav) * 100).toFixed(2) + "%"
                : "-";
          }
        });

        // ===== 시총 내림차순 기본 정렬 =====
        const tbody = document.querySelector("tbody");
        const sortedRows = [...rows].sort((a, b) => {
          const aVal = Number(a.querySelector(".MKTCAP").dataset.raw || 0);
          const bVal = Number(b.querySelector(".MKTCAP").dataset.raw || 0);
          return bVal - aVal;
        });
        sortedRows.forEach((r) => tbody.appendChild(r));
        updateRowNumbers();

        // ===== 헤더 클릭 정렬 =====
        const table = document.querySelector("table");
        const headers = Array.from(table.querySelectorAll("th"));
        const ascPreferred = ["종목명", "실부담비용", "괴리율"];

        headers.forEach((th, idx) => {
          th.style.cursor = "pointer";
          let asc = ascPreferred.includes(th.textContent.trim());
          th.addEventListener("click", () => {
            const rowsArr = Array.from(tbody.querySelectorAll("tr"));
            const isNumeric = (val) => !isNaN(parseFloat(val)) && isFinite(val);
            rowsArr.sort((a, b) => {
              const aText = a.children[idx].textContent.replace(/[,%원억조]/g, "").trim();
              const bText = b.children[idx].textContent.replace(/[,%원억조]/g, "").trim();
              if (isNumeric(aText) && isNumeric(bText)) {
                return asc ? aText - bText : bText - aText;
              } else {
                return asc ? aText.localeCompare(bText, "ko") : bText.localeCompare(aText, "ko");
              }
            });
            rowsArr.forEach((r) => tbody.appendChild(r));
            asc = !asc;
            updateRowNumbers();
          });
        });

        // ===== 쿠키 상태로 북마크 초기 렌더링 =====
        const bookmarked = new Set(getBookmarks());
        rows.forEach((row) => {
          const code = row.dataset.code;
          if (!code || !bookmarked.has(code)) return;
          const icon = row.querySelector(".bi-bookmark, .bi-bookmark-fill");
          if (!icon) return;
          icon.classList.remove("bi-bookmark");
          icon.classList.add("bi-bookmark-fill");
          icon.style.color = "#FFD43B";
        });

        // ===== 북마크 클릭 → 쿠키 갱신 (헤더 forEach 바깥) =====
        document.addEventListener("click", (e) => {
          const icon = e.target.closest(".bi-bookmark, .bi-bookmark-fill");
          if (!icon) return;
          const row = icon.closest("tr[data-code]");
          if (!row) return;
          const code = row.dataset.code;
          if (!code) return;

          const cur = new Set(getBookmarks());
          if (icon.classList.contains("bi-bookmark")) {
            icon.classList.replace("bi-bookmark", "bi-bookmark-fill");
            icon.style.color = "#FFD43B";
            cur.add(code);
          } else {
            icon.classList.replace("bi-bookmark-fill", "bi-bookmark");
            icon.style.color = "#B0B0B0";
            cur.delete(code);
          }
          setBookmarks([...cur]);
        });
      });
    </script>
</main>

</html>
